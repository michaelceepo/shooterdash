function updateBoss(speed) {
      if (!boss || !boss.active) return;
      boss.pulse += 0.08;
      boss.coreGlow += 0.14;
      boss.patternTimer += 1;
      if (boss.phaseFlash > 0) boss.phaseFlash -= 1;

      if (!boss.entered) {
        boss.x -= speed * 1.15;
        boss.y = 224 + Math.sin(frame * 0.045 + boss.driftSeed) * 12;
        if (boss.x <= W - 260) {
          boss.entered = true;
          bossShield = getStageConfig().bossShieldCount || 2;
          bossWarningTimer = 100;
          showBanner('BOSS LOCKED IN', stageBossLabel(getStageConfig()), 92, '#fb7185');
          screenShake = Math.max(screenShake, 5 * (gameSettings?.fxStrength || 1));
        }
        return;
      }

      const cfg = getStageConfig();
      const px = player.x + player.size / 2;
      const py = player.y + player.size / 2;

      if (boss.phase === 1 && boss.hp <= boss.maxHp * 0.5) {
        boss.phase = 2;
        boss.phaseFlash = 84;
        boss.justChangedPhase = true;
        showBanner('PHASE 2', 'Boss patterns just changed', 92, '#fb7185');
        playSfx(missileSound, Math.min(1, BASE_MISSILE_VOLUME * (gameSettings?.sfxVolume || 1) * 1.1));
        screenShake = Math.max(screenShake, 7 * (gameSettings?.fxStrength || 1));
      }

      const motion = frame * 0.028 + boss.driftSeed;
      if (boss.archetype === 'spread') {
        boss.targetX = W - (boss.phase === 2 ? 238 : 254) + Math.sin(motion * 1.1) * (boss.phase === 2 ? 44 : 28);
        boss.targetY = 208 + Math.sin(motion * 1.7) * boss.moveAmp + Math.cos(motion * 0.8) * 10;
      } else if (boss.archetype === 'pulse') {
        boss.targetX = W - (boss.phase === 2 ? 234 : 248) + Math.sin(motion * 0.8) * (boss.phase === 2 ? 50 : 26);
        boss.targetY = 214 + Math.sin(motion * 1.25) * (boss.phase === 2 ? boss.moveAmp + 12 : boss.moveAmp);
      } else {
        boss.targetX = W - (boss.phase === 2 ? 226 : 242) + Math.sin(motion * 0.95) * (boss.phase === 2 ? 34 : 18);
        boss.targetY = 220 + Math.sin(motion * 1.45) * 28 + Math.cos(motion * 0.7) * 14;
      }

      boss.x += (boss.targetX - boss.x) * 0.06;
      boss.y += (boss.targetY - boss.y) * 0.09;

      boss.fireCooldown -= 1;
      if (boss.fireCooldown > 0) {
        boss.justChangedPhase = false;
      }

      if (boss.fireCooldown <= 0) {
        const sx = boss.x + boss.w * 0.16;
        const sy = boss.y - boss.h * 0.52;
        const dx = px - sx;
        const dy = py - sy;
        const mag = Math.hypot(dx, dy) || 1;
        const ndx = dx / mag;
        const ndy = dy / mag;
        const speedB = boss.phase === 2 ? cfg.bossBulletSpeed2 : cfg.bossBulletSpeed1;

        if (boss.archetype === 'spread') {
          const spreadAngles = boss.phase === 2 ? [-0.48, -0.24, 0, 0.24, 0.48] : [-0.28, 0, 0.28];
          spreadAngles.forEach((spread) => {
            const cs = Math.cos(spread), sn = Math.sin(spread);
            bossBullets.push({
              x: sx, y: sy, w: 24, h: 16,
              vx: (ndx * cs - ndy * sn) * speedB,
              vy: (ndx * sn + ndy * cs) * speedB,
              type: 'dart',
              life: 140,
              rot: Math.atan2((ndx * sn + ndy * cs) * speedB, (ndx * cs - ndy * sn) * speedB)
            });
          });
          if (boss.phase === 2) {
            bossBullets.push({
              x: sx, y: sy, w: 18, h: 18,
              vx: -3.2,
              vy: 0,
              type: 'mine',
              life: 170,
              wavePhase: Math.random() * Math.PI * 2
            });
          }
          boss.fireCooldown = (boss.phase === 2 ? cfg.bossFire2[0] : cfg.bossFire1[0]) + 10;
        } else if (boss.archetype === 'pulse') {
          const ringCount = boss.phase === 2 ? 10 : 7;
          for (let i = 0; i < ringCount; i++) {
            const angle = (-0.78 + (i / Math.max(1, ringCount - 1)) * 1.56);
            const cs = Math.cos(angle), sn = Math.sin(angle);
            bossBullets.push({
              x: sx, y: sy, w: 18, h: 18,
              vx: (ndx * cs - ndy * sn) * (speedB * 0.92),
              vy: (ndx * sn + ndy * cs) * (speedB * 0.92),
              type: 'pulse',
              life: 150
            });
          }
          if (boss.phase === 2) {
            [-1, 1].forEach((dir) => {
              bossBullets.push({
                x: sx, y: sy + dir * 28, w: 16, h: 42,
                vx: -5.4,
                vy: dir * 0.55,
                type: 'blade',
                life: 120
              });
            });
          }
          boss.fireCooldown = (boss.phase === 2 ? cfg.bossFire2[0] : cfg.bossFire1[0]) + 12;
        } else {
          const spreadAngles = boss.phase === 2 ? [-0.18, 0, 0.18] : [0];
          spreadAngles.forEach((spread) => {
            const cs = Math.cos(spread), sn = Math.sin(spread);
            bossBullets.push({
              x: sx, y: sy, w: boss.phase === 2 ? 24 : 20, h: 20,
              vx: (ndx * cs - ndy * sn) * speedB,
              vy: (ndx * sn + ndy * cs) * speedB,
              type: 'orb',
              life: 135
            });
          });
          if (boss.phase === 2) {
            const laneBase = py < GROUND - 70 ? 1 : -1;
            [-1, 1].forEach((dir) => {
              bossBullets.push({
                x: sx + 10, y: sy + dir * 36, w: 18, h: 48,
                vx: -4.8,
                vy: laneBase * dir * 0.42,
                type: 'blade',
                life: 128
              });
            });
          }
          boss.fireCooldown = (boss.phase === 2 ? cfg.bossFire2[0] : cfg.bossFire1[0]) + Math.floor(Math.random() * 12);
        }

        playSfx(missileSound, Math.min(1, BASE_MISSILE_VOLUME * (gameSettings?.sfxVolume || 1)));
        boss.justChangedPhase = false;
      }

      if (boss.hp <= 0) {
        boss.hp = 0;
        bossBullets = [];
        bossJustDefeated = true;
        showBanner('CORE COLLAPSE', 'Finish sequence', 96, '#fde68a');
        bossDefeatSequence = {
          timer: 0,
          exploded: false,
          explosionTimer: 0,
          explosionX: boss.x + boss.w / 2,
          explosionY: boss.y - boss.h / 2,
          flash: 0,
          microBurstTimer: 0
        };
        state = STATE_BOSS_DEFEAT;
      }
    }

function updateBossBullets() {
      for (const b of bossBullets) {
        if (b.type === 'mine') {
          b.x += b.vx;
          b.y += Math.sin((frame * 0.14) + (b.wavePhase || 0)) * 1.4;
          b.vx *= 0.997;
        } else {
          b.x += b.vx;
          b.y += b.vy;
        }
        b.life = (b.life ?? 160) - 1;
      }
      bossBullets = bossBullets.filter(b => (b.life ?? 0) > 0 && b.x + (b.w || 0) > -90 && b.x < W + 90 && b.y > -90 && b.y < H + 90);
    }

function updateEnemyShooting() {
      if (boss && boss.entered) return;
      const comfortBuffer = speedupTriggered && worldDistance < SPEEDUP_DISTANCE + PIXELS_PER_BEAT * 6;
      if (comfortBuffer) return;
      for (const e of enemies) {
        if (e.archetype === 'chaser') continue;
        if (e.x < 280 || e.x > W + 10) continue;
        e.shootCooldown -= 1;
        if (e.shootCooldown > 0) continue;
        const sx = e.x + e.w * 0.28;
        const sy = enemyBodyTop(e) + e.h * 0.45;
        const px = player.x + player.size / 2;
        const py = player.y + player.size / 2;
        const dx = px - sx;
        const dy = py - sy;
        const mag = Math.hypot(dx, dy) || 1;
        const ndx = dx / mag;
        const ndy = dy / mag;
        if (e.archetype === 'burst') {
          [-0.22, 0, 0.22].forEach((spread) => {
            const cs = Math.cos(spread), sn = Math.sin(spread);
            enemyBullets.push({
              x: sx,
              y: sy,
              vx: (ndx * cs - ndy * sn) * 5.1,
              vy: (ndx * sn + ndy * cs) * 5.1,
              size: 8,
              life: 105,
              color: '#fb7185'
            });
          });
          e.shootCooldown = e.fireRate + Math.random() * 18;
        } else if (e.archetype === 'hover') {
          enemyBullets.push({
            x: sx,
            y: sy,
            vx: -4.6,
            vy: 1.1 + Math.sin(frame * 0.04 + e.hoverSeed) * 0.6,
            size: 7,
            life: 120,
            color: '#38bdf8'
          });
          e.shootCooldown = e.fireRate + Math.random() * 12;
        } else {
          enemyBullets.push({
            x: sx,
            y: sy,
            vx: ndx * 5.4,
            vy: ndy * 5.4,
            size: 7,
            life: 110,
            color: '#f97316'
          });
          e.shootCooldown = e.fireRate + Math.random() * 22;
        }
      }
    }

    function updateEnemyBullets() {
      for (const b of enemyBullets) {
        b.x += b.vx;
        b.y += b.vy;
        b.life -= 1;
      }
      if (checkpointToastTimer > 0) checkpointToastTimer -= 1;
      if (bossWarningTimer > 0) bossWarningTimer -= 1;
      if (uiBanner) {
        uiBanner.timer -= 1;
        if (uiBanner.timer <= 0) uiBanner = null;
      }
      screenShake *= 0.82;
      enemyBullets = enemyBullets.filter(b => b.life > 0 && b.x > -40 && b.x < W + 40 && b.y > -40 && b.y < H + 40);
    }

    function resolvePlatforms(prevY) {
      if (boss && boss.entered) return;
      const bottom = player.y + player.size;
      for (const o of obstacles) {
        if (o.type !== 'step') continue;
        const onX = player.x + player.size > o.x && player.x < o.x + o.w;
        const wasAbove = prevY + player.size <= o.y + 2;
        if (onX && wasAbove && bottom >= o.y && bottom <= o.y + o.h + 18 && player.vy >= 0) {
          player.y = o.y - player.size;
          player.vy = 0;
          player.grounded = true;
          player.jumpsUsed = 0;
        }
      }
    }

    function collectPickups() {
      for (let i = pickups.length - 1; i >= 0; i--) {
        const p = pickups[i];
        if (circleRectOverlap(p.x, p.y, p.r, player.x, player.y, player.size, player.size)) {
          player.ammo += 10;
          pickups.splice(i, 1);
        }
      }

      for (let i = powerUps.length - 1; i >= 0; i--) {
        const p = powerUps[i];
        if (circleRectOverlap(p.x, p.y, p.r, player.x, player.y, player.size, player.size)) {
          if (p.kind === 'jump') {
            const boostFrames = Math.round(JUMP_BOOST_BEATS * 3600 / Math.max(1, currentBpm));
            player.jumpBoostFrames = Math.max(player.jumpBoostFrames, boostFrames);
          } else {
            player.invincible = Math.max(player.invincible, INVINCIBLE_FRAMES);
          }
          powerUps.splice(i, 1);
        }
      }
    }

    function updateBullets() {
      for (const b of bullets) {
        b.x += b.vx;
        b.y += b.vy || 0;
        b.life -= 1;
      }
      bullets = bullets.filter(b => b.life > 0 && b.x > -60 && b.x < W + 60 && b.y > -60 && b.y < H + 60);

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        let hit = false;

        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (circleRectOverlap(b.x, b.y, b.size / 2, e.x, enemyBodyTop(e), e.w, e.h)) {
            e.hp -= 1;
            e.shake = 10;
            e.hitFlash = 8;
            if (e.archetype !== 'hover') e.vy = -3.5;
            screenShake = Math.max(screenShake, 2);
            if (e.hp <= 0) {
              spawnEnemyPop(e.x + e.w / 2, enemyBodyTop(e) + e.h * 0.55);
              enemies.splice(j, 1);
            }
            hit = true;
            break;
          }
        }

        if (!hit && boss && boss.active && circleRectOverlap(b.x, b.y, b.size / 2, boss.x, boss.y - boss.h, boss.w, boss.h)) {
          boss.hp -= 1;
          boss.coreGlow += 0.8;
          screenShake = Math.max(screenShake, 2);
          hit = true;
        }

        if (hit) bullets.splice(i, 1);
      }
    }

    function handleCollisions() {
      if (player.invincible > 0) return;
      const inBossArena = boss && boss.entered;

      if (!inBossArena) {
        for (const o of obstacles) {
          if (o.type === 'step' && o.h <= 40 && o.w >= 100 && player.size > 48) {
            const tunnelHit = circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.34, o.x, o.y, o.w, o.h);
            if (tunnelHit) {
              die('#60a5fa');
              return;
            }
          }
          if (o.type === 'spike' && circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.38, o.x, o.y - o.h, o.w, o.h)) {
            die('#f97316');
            return;
          }
          if (o.type === 'step') {
            const isTunnelCeiling = o.h <= 40 && o.w >= 100;
            if (isTunnelCeiling && player.size <= 48 && player.y >= o.y + o.h - 4) {
              continue;
            }
            const touching = circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.4, o.x, o.y, o.w, o.h);
            const landed = player.grounded && Math.abs(player.y + player.size - o.y) < 4;
            if (touching && !landed) {
              die('#a855f7');
              return;
            }
          }
        }

        const comfortBuffer = speedupTriggered && worldDistance < SPEEDUP_DISTANCE + PIXELS_PER_BEAT * 6;
        if (!comfortBuffer) {
          for (const e of enemies) {
            if (circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.38, e.x, enemyBodyTop(e), e.w, e.h)) {
              die('#ef4444');
              return;
            }
          }
        }
      }

      for (let i = bossBullets.length - 1; i >= 0; i--) {
        const b = bossBullets[i];
        if (circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.38, b.x - b.w / 2, b.y - b.h / 2, b.w, b.h)) {
          if (bossShield > 0) {
            bossShield -= 1;
            bossBullets.splice(i, 1);
            player.invincible = 45;
            continue;
          }
          die('#f43f5e');
          return;
        }
      }

      for (const b of enemyBullets) {
        if (circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.38, b.x, b.y, b.size, b.size)) {
          die('#f59e0b');
          return;
        }
      }

      if (boss && boss.active && circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.38, boss.x, boss.y - boss.h, boss.w, boss.h)) {
        if (bossShield > 0) {
          bossShield -= 1;
          player.invincible = 45;
          return;
        }
        die('#8b5cf6');
      }
    }

    function updateDead() {
      deathTimer -= 1;
      if (deathBurst) deathBurst.pulse += 1;
      updateParticles();
      if (deathTimer <= 0) {
        if (isTimeTrialStage()) finishTimeTrialRun();
        else restoreCheckpoint();
      }
    }

    
function updateBossDefeat() {
      if (!bossDefeatSequence || !boss) return;
      bossDefeatSequence.timer += cinematicTimeScale;
      bossDefeatSequence.microBurstTimer += 1;

      if (bossDefeatSequence.timer < 96) {
        cinematicTimeScale = 0.72;
        boss.y = 220 + Math.sin(frame * 0.18) * 8;
        if (bossDefeatSequence.microBurstTimer % 14 === 0) {
          const sparkX = boss.x + boss.w * (0.25 + Math.random() * 0.5);
          const sparkY = boss.y - boss.h * (0.2 + Math.random() * 0.5);
          for (let i = 0; i < 8; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1.5 + Math.random() * 3.5;
            particles.push({
              x: sparkX, y: sparkY,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              size: 3 + Math.random() * 4,
              life: 18 + Math.random() * 10,
              color: i % 2 ? '#fff1a8' : '#ff7a59'
            });
          }
        }
      } else if (bossDefeatSequence.timer < 145) {
        cinematicTimeScale = 0.84;
        boss.y = 220 + Math.sin(frame * 0.12) * 4;
        boss.pulse += 0.22;
      } else {
        if (!bossDefeatSequence.exploded) {
          bossDefeatSequence.exploded = true;
          bossDefeatSequence.flash = 1;
          cinematicTimeScale = 1;
          const cx = boss.x + boss.w / 2;
          const cy = boss.y - boss.h / 2;
          for (let i = 0; i < 110; i++) {
            const angle = (Math.PI * 2 * i) / 110 + Math.random() * 0.3;
            const speed = 2 + Math.random() * 9;
            particles.push({
              x: cx,
              y: cy,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              size: 6 + Math.random() * 12,
              life: 40 + Math.random() * 42,
              color: i % 3 === 0 ? '#fff1a8' : (i % 3 === 1 ? '#ff7a59' : '#ef4444')
            });
          }
          screenShake = Math.max(screenShake, 10 * (gameSettings?.fxStrength || 1));
        }
        bossDefeatSequence.explosionTimer += cinematicTimeScale;
        bossDefeatSequence.flash *= 0.94;
      }

      if (bossDefeatSequence.timer >= 272) {
        cinematicTimeScale = 1;
        boss = null;
        bossDefeatSequence = null;
        setWinState();
      }
    }

    function updateParticles() {
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;
      }
      particles = particles.filter(p => p.life > 0);
    }

    function update() {
      updateGamepad();
      updateHeldJumpAuto();
      if (menuPreviewJump > 0) menuPreviewJump -= 1;
      if (gameplayBannerTimer > 0) gameplayBannerTimer -= 1;
      const bannerTarget = gameplayBannerTimer > 0 ? 1 : 0;
      gameplayBannerAlpha += (bannerTarget - gameplayBannerAlpha) * 0.15;
      updateStageCameraEffects();
      const stageSlope = getStageSlopeInfo();
      if (!runEventFlags.downhill && stageSlope.justStarted) {
        runEventFlags.downhill = true;
        showGameplayBanner('DOWNHILL DROP', 105);
      }
      if (!runEventFlags.levelOut && stageSlope.justEnded) {
        runEventFlags.levelOut = true;
        showGameplayBanner('LEVEL OUT', 95);
      }
      if (state === 'paused') return;
      if (state === STATE_RUN) {
        updateRun();
        updateParticles();
      } else if (state === STATE_DEAD) {
        updateDead();
      } else if (state === STATE_BOSS_DEFEAT) {
        frame += 1;
        updateBossDefeat();
        updateParticles();
      }
    }

    function circleRectOverlap(cx, cy, cr, rx, ry, rw, rh) {
      const px = Math.max(rx, Math.min(cx, rx + rw));
      const py = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - px;
      const dy = cy - py;
      return dx * dx + dy * dy <= cr * cr;
    }

    function getSecondsLeft() {
      const remaining = Math.max(0, LEVEL_DISTANCE - worldDistance);
      const seconds = remaining / Math.max(1, currentBaseSpeed * 60);
      return Math.max(0, Math.ceil(seconds));
    }

    function drawBackground() {
      if (!window.bgImg) {
        refreshBackground();
      }

      if (window.bgLoaded) {
        const img = window.bgImg;
        const scaleBoost = Math.abs(stageTiltAngle) > 0.01 ? 1.12 : 1;
        const scale = Math.max(W / img.width, H / img.height) * scaleBoost;
        const drawW = img.width * scale;
        const drawH = img.height * scale;
        const y = (H - drawH) / 2;
        const scroll = (worldDistance * 0.18) % drawW;
        const intensity = getStageIntensity();

        ctx.drawImage(img, -scroll, y, drawW, drawH);
        ctx.drawImage(img, -scroll + drawW, y, drawW, drawH);
        if (scroll > 0) {
          ctx.drawImage(img, -scroll - drawW, y, drawW, drawH);
        }

        if (state === STATE_RUN) {
          const dangerAlpha = Math.max(0, intensity - 0.45) * 0.18 + (bossWarningTimer > 0 ? 0.08 : 0);
          if (dangerAlpha > 0.01) {
            const dangerGrad = ctx.createLinearGradient(0, 0, W, 0);
            dangerGrad.addColorStop(0, `rgba(255, 70, 70, ${dangerAlpha * 0.45})`);
            dangerGrad.addColorStop(0.5, 'rgba(255, 70, 70, 0)');
            dangerGrad.addColorStop(1, `rgba(255, 70, 70, ${dangerAlpha * 0.45})`);
            ctx.fillStyle = dangerGrad;
            ctx.fillRect(0, 0, W, H);
          }
        }


      } else {
        const fallback = ctx.createLinearGradient(0, 0, 0, H);
        fallback.addColorStop(0, '#112246');
        fallback.addColorStop(1, '#08111f');
        ctx.fillStyle = fallback;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawHomeBackground() {
      setShellBackgroundImage('menu.png');
      if (menuBgLoaded) {
        const img = menuBgImg;
        const scale = Math.max(W / img.width, H / img.height);
        const drawW = img.width * scale;
        const drawH = img.height * scale;
        const x = (W - drawW) / 2;
        const y = (H - drawH) / 2;
        ctx.fillStyle = '#08111f';
        ctx.fillRect(0, 0, W, H);
        ctx.drawImage(img, x, y, drawW, drawH);

      } else {
        const fallback = ctx.createLinearGradient(0, 0, 0, H);
        fallback.addColorStop(0, '#112246');
        fallback.addColorStop(1, '#08111f');
        ctx.fillStyle = fallback;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawMenuPreviewSprite(x, y, size) {
      const jumpOffset = menuPreviewJump > 0 ? Math.sin((18 - menuPreviewJump) / 18 * Math.PI) * -18 : 0;
      if (playerSpriteLoaded) {
        ctx.save();
        ctx.drawImage(playerImg, x, y + jumpOffset, size, size);
        ctx.restore();
      } else {
        ctx.save();
        ctx.translate(x + size / 2, y + size / 2 + jumpOffset);
        const radius = size * 0.38;
        ctx.shadowColor = selectedMenuColor;
        ctx.shadowBlur = 22;
        ctx.strokeStyle = selectedMenuColor;
        ctx.lineWidth = Math.max(4, size * 0.085);
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 0.28;
        ctx.fillStyle = selectedMenuColor;
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.72, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    

// NOTE: Main menu approved by user. Do not change main menu layout/styling again unless explicitly requested.

    function drawObstacles() {

          const grad = ctx.createLinearGradient(o.x, o.y, o.x, o.y + o.h);
          grad.addColorStop(0, '#8be9ff');
          grad.addColorStop(0.5, '#38bdf8');
          grad.addColorStop(1, '#0f3b63');
          ctx.save();
          ctx.shadowColor = 'rgba(56, 189, 248, 0.55)';
          ctx.shadowBlur = 14;

          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(o.x, o.y, o.w, o.h, 6); else ctx.rect(o.x,o.y,o.w,o.h);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'rgba(220, 245, 255, 0.92)';
          ctx.fillRect(o.x + 6, o.y + 3, o.w - 12, Math.min(6, o.h*0.22));
          ctx.fillStyle = 'rgba(5,32,58,0.35)';
          ctx.fillRect(o.x + 4, o.y + o.h - 4, o.w - 8, 3);
          ctx.strokeStyle = 'rgba(170, 235, 255, 0.95)';
          ctx.lineWidth = 1.8;
          if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(o.x, o.y, o.w, o.h, 6); ctx.stroke(); } else ctx.strokeRect(o.x,o.y,o.w,o.h);
          ctx.restore();
        } else {
          const x = o.x, y = o.y, w = o.w, h = o.h;
          ctx.save();
          ctx.shadowColor = 'rgba(56, 189, 248, 0.55)';
          ctx.shadowBlur = 16;
          const grad = ctx.createLinearGradient(x, y - h, x, y);
          grad.addColorStop(0, '#8be9ff');
          grad.addColorStop(0.4, '#38bdf8');
          grad.addColorStop(1, '#0f3b63');

          ctx.beginPath();

          ctx.shadowBlur = 0;

    function drawEnemies() {
      if (boss && boss.entered) return;
      const comfortBuffer = speedupTriggered && worldDistance < SPEEDUP_DISTANCE + PIXELS_PER_BEAT * 6;
      for (const e of enemies) {
        if (comfortBuffer) continue;
        const w = e.w, h = e.h;
        const jitter = e.shake > 0 ? (Math.sin(frame * 0.8) * 4 + (Math.random() - 0.5) * 2) : 0;
        const x = e.x + jitter;
        const y = e.y + (e.offsetY || 0);
        const isTurret = false;
        const isBurst = false;
        const isHover = false;
        const accent = '#ef4444';
        const topTone = e.trainingCone ? '#fecaca' : '#ffd0d0';
        const bottomTone = e.trainingCone ? '#5a1212' : '#4a0b0b';
        ctx.save();
        ctx.shadowColor = e.hitFlash > 0 ? 'rgba(255,255,255,0.95)' : 'rgba(239,68,68,0.95)';
        ctx.shadowBlur = e.hitFlash > 0 ? 24 : 18;
        const bodyGrad = ctx.createLinearGradient(x, y - h, x, y);
        bodyGrad.addColorStop(0, topTone);
        bodyGrad.addColorStop(0.35, accent);
        bodyGrad.addColorStop(1, bottomTone);
        ctx.fillStyle = bodyGrad;
        if (isTurret) {
          ctx.fillRect(x, y - h, w, h);
          ctx.fillStyle = 'rgba(255,255,255,0.18)';
          ctx.fillRect(x + 5, y - h + 4, w - 10, 8);
        } else if (isHover) {
          ctx.beginPath();
          ctx.ellipse(x + w / 2, y - h / 2, w * 0.55, h * 0.38, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.fillRect(x + w * 0.46, y - h * 0.68, 4, h * 0.34);
        } else {
          ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + w / 2, y - h); ctx.lineTo(x + w, y); ctx.closePath(); ctx.fill();
          ctx.fillStyle = 'rgba(220,245,255,0.92)';
          ctx.beginPath(); ctx.moveTo(x + w * 0.24, y - 2); ctx.lineTo(x + w * 0.5, y - h * 0.72); ctx.lineTo(x + w * 0.76, y - 2); ctx.closePath(); ctx.fill();
        }
        ctx.shadowBlur = 0;
        ctx.strokeStyle = e.hitFlash > 0 ? '#ffffff' : 'rgba(255,230,230,0.95)';
        ctx.lineWidth = 2.5;
        if (isTurret) ctx.strokeRect(x, y - h, w, h);
        else if (isHover) { ctx.beginPath(); ctx.ellipse(x + w / 2, y - h / 2, w * 0.55, h * 0.38, 0, 0, Math.PI * 2); ctx.stroke(); }
        else { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + w / 2, y - h); ctx.lineTo(x + w, y); ctx.closePath(); ctx.stroke(); }
        ctx.textAlign = 'left';
        ctx.restore();
      }
    }

    function drawEnemyBullets() {
      for (const b of enemyBullets) {
        ctx.save();
        ctx.fillStyle = b.color || '#f97316';
        ctx.shadowColor = b.color || 'rgba(249,115,22,0.9)';
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);

    }

    
function drawBoss() {
      if (!boss) return;
      const defeat = bossDefeatSequence;
      if (defeat && defeat.exploded && defeat.explosionTimer > 40) return;

      let pulse = 1 + Math.sin(boss.pulse) * 0.04;
      let shakeX = 0;
      let shakeY = 0;
      if (defeat) {
        if (defeat.timer < 96) {
          shakeX = (Math.random() - 0.5) * 16;
          shakeY = (Math.random() - 0.5) * 10;
        } else if (defeat.timer < 145) {
          shakeX = (Math.random() - 0.5) * 8;
          shakeY = (Math.random() - 0.5) * 6;
          pulse = 1.08 + Math.sin(defeat.timer * 0.35) * 0.08;
        }
      }

      ctx.save();
      ctx.translate(boss.x + boss.w / 2 + shakeX, boss.y - boss.h / 2 + shakeY);
      ctx.scale(pulse, pulse);

      const w = boss.w, h = boss.h;
      const phaseTwo = boss.phase === 2;
      const topColor = phaseTwo ? '#ffd49c' : '#ff9ea5';
      const midColor = phaseTwo ? '#ff8d3a' : '#ff4d4d';
      const bottomColor = phaseTwo ? '#4c1208' : '#3b0a0a';
      const grad = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
      grad.addColorStop(0, topColor);
      grad.addColorStop(0.4, midColor);
      grad.addColorStop(1, bottomColor);
      ctx.shadowColor = phaseTwo ? 'rgba(255, 145, 70, 0.7)' : 'rgba(255, 70, 70, 0.65)';
      ctx.shadowBlur = 24;
      ctx.fillStyle = grad;

      if (boss.archetype === 'spread') {
        ctx.beginPath();
        ctx.moveTo(-w * 0.54, h * 0.16);
        ctx.lineTo(-w * 0.28, -h * 0.42);
        ctx.lineTo(0, -h * 0.26);
        ctx.lineTo(w * 0.28, -h * 0.42);
        ctx.lineTo(w * 0.54, h * 0.16);
        ctx.lineTo(w * 0.18, h * 0.52);
        ctx.lineTo(-w * 0.18, h * 0.52);
        ctx.closePath();
        ctx.fill();
      } else if (boss.archetype === 'pulse') {
        ctx.beginPath();
        ctx.arc(0, 0, w * 0.34, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(-w * 0.12, -h * 0.46, w * 0.24, h * 0.92);
        ctx.fillRect(-w * 0.46, -h * 0.12, w * 0.92, h * 0.24);
      } else {
        ctx.beginPath();
        ctx.moveTo(-w * 0.50, h * 0.18);
        ctx.lineTo(-w * 0.30, -h * 0.38);
        ctx.lineTo(0, -h * 0.50);
        ctx.lineTo(w * 0.30, -h * 0.38);
        ctx.lineTo(w * 0.50, h * 0.18);
        ctx.lineTo(w * 0.18, h * 0.50);
        ctx.lineTo(-w * 0.18, h * 0.50);
        ctx.closePath();
        ctx.fill();
      }

      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,240,230,0.98)';
      if (boss.archetype === 'pulse') {
        ctx.beginPath();
        ctx.arc(0, 0, w * 0.14 + Math.sin(boss.coreGlow) * 4, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(-w * 0.14, h * 0.32);
        ctx.lineTo(0, -h * 0.26);
        ctx.lineTo(w * 0.14, h * 0.32);
        ctx.closePath();
        ctx.fill();
      }

      if (phaseTwo || boss.phaseFlash > 0) {
        ctx.strokeStyle = `rgba(255, 235, 170, ${phaseTwo ? 0.95 : 0.75})`;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, w * 0.32 + Math.sin(frame * 0.1) * 4, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.strokeStyle = 'rgba(255,205,205,0.95)';
      ctx.lineWidth = 4;
      if (boss.archetype === 'spread') {
        ctx.beginPath();
        ctx.moveTo(-w * 0.54, h * 0.16);
        ctx.lineTo(-w * 0.28, -h * 0.42);
        ctx.lineTo(0, -h * 0.26);
        ctx.lineTo(w * 0.28, -h * 0.42);
        ctx.lineTo(w * 0.54, h * 0.16);
        ctx.lineTo(w * 0.18, h * 0.52);
        ctx.lineTo(-w * 0.18, h * 0.52);
        ctx.closePath();
      } else if (boss.archetype === 'pulse') {
        ctx.beginPath();
        ctx.arc(0, 0, w * 0.34, 0, Math.PI * 2);
      } else {
        ctx.beginPath();
        ctx.moveTo(-w * 0.50, h * 0.18);
        ctx.lineTo(-w * 0.30, -h * 0.38);
        ctx.lineTo(0, -h * 0.50);
        ctx.lineTo(w * 0.30, -h * 0.38);
        ctx.lineTo(w * 0.50, h * 0.18);
        ctx.lineTo(w * 0.18, h * 0.50);
        ctx.lineTo(-w * 0.18, h * 0.50);
        ctx.closePath();
      }
      ctx.stroke();
      ctx.restore();

      if (defeat && defeat.exploded) {
        const r = 40 + defeat.explosionTimer * 6;
        const alpha = Math.max(0, 1 - defeat.explosionTimer / 45);
        const cx = defeat.explosionX;
        const cy = defeat.explosionY;
        ctx.save();
        ctx.globalAlpha = alpha;
        const burst = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        burst.addColorStop(0, 'rgba(255,255,255,0.98)');
        burst.addColorStop(0.2, 'rgba(255,230,140,0.95)');
        burst.addColorStop(0.55, 'rgba(255,110,70,0.78)');
        burst.addColorStop(1, 'rgba(255,80,80,0)');
        ctx.fillStyle = burst;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      if (!defeat) {
        const hpRatio = Math.max(0, boss.hp / boss.maxHp);
        ctx.fillStyle = 'rgba(8,17,31,0.52)';
        ctx.fillRect(250, 18, 500, 28);
        const hpGrad = ctx.createLinearGradient(250, 0, 750, 0);
        hpGrad.addColorStop(0, phaseTwo ? '#fb923c' : '#fb7185');
        hpGrad.addColorStop(1, phaseTwo ? '#facc15' : '#ef4444');
        ctx.fillStyle = hpGrad;
        ctx.fillRect(250, 18, 500 * hpRatio, 28);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.strokeRect(250, 18, 500, 28);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px Arial';
        const bossName = stageBossLabel(getStageConfig());
        ctx.fillText(`BOSS • ${bossName}${phaseTwo ? ' • PHASE 2' : ''}`, 404, 37);
      }
    }


function drawBossBullets() {
      for (const b of bossBullets) {
        const angle = Math.atan2(b.vy || 0, b.vx || -1);
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(angle);

        if (b.type === 'blade') {
          ctx.shadowColor = 'rgba(253, 224, 71, 0.95)';
          ctx.shadowBlur = 18;
          ctx.fillStyle = '#fde047';
          ctx.fillRect(-b.w * 0.45, -b.h * 0.5, b.w * 0.9, b.h);
          ctx.fillStyle = 'rgba(255,255,255,0.82)';
          ctx.fillRect(-2, -b.h * 0.5, 4, b.h);
        } else if (b.type === 'dart') {
          ctx.shadowColor = 'rgba(251, 113, 133, 0.95)';
          ctx.shadowBlur = 18;
          ctx.fillStyle = '#fb7185';
          ctx.beginPath();
          ctx.moveTo(b.w * 0.62, 0);
          ctx.lineTo(-b.w * 0.34, -b.h * 0.5);
          ctx.lineTo(-b.w * 0.18, 0);
          ctx.lineTo(-b.w * 0.34, b.h * 0.5);
          ctx.closePath();
          ctx.fill();
        } else if (b.type === 'mine') {
          ctx.shadowColor = 'rgba(251, 191, 36, 0.95)';
          ctx.shadowBlur = 16;
          ctx.fillStyle = '#fbbf24';
          ctx.beginPath();
          ctx.arc(0, 0, b.w * 0.6, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.88)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, b.w * 0.82, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          const r = b.type === 'pulse' ? b.w * 0.62 : b.w * 0.52;
          ctx.shadowColor = b.type === 'pulse' ? 'rgba(253, 224, 71, 0.95)' : 'rgba(251, 113, 133, 0.95)';
          ctx.shadowBlur = 18;
          ctx.fillStyle = b.type === 'pulse' ? '#fde047' : '#fb7185';
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          ctx.beginPath();
          ctx.arc(-r * 0.22, -r * 0.18, r * 0.35, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

function drawBullets() {

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x + player.size / 2, player.y + player.size / 2);
      ctx.rotate(player.rotation);
      const radius = player.size * 0.38;
      ctx.shadowColor = player.invincible > 0 ? 'rgba(56,189,248,0.95)' : selectedMenuColor;
      ctx.shadowBlur = player.invincible > 0 ? 30 : 26;
      ctx.strokeStyle = player.invincible > 0 ? '#38bdf8' : selectedMenuColor;
      ctx.lineWidth = Math.max(4, player.size * 0.085);
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = player.invincible > 0 ? 'rgba(56,189,248,0.32)' : selectedMenuColor;
      ctx.beginPath();
      ctx.arc(0, 0, radius * 0.72, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(220,255,240,0.95)';
      ctx.lineWidth = Math.max(1.5, player.size * 0.028);
      ctx.beginPath();
      ctx.arc(0, 0, radius * 0.74, -0.8, 0.4);
      ctx.stroke();

    function drawParticles() {
      for (const p of particles) {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      }
      for (const burst of enemyPopBursts) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, burst.flash * 0.55);
        ctx.strokeStyle = 'rgba(255,255,255,0.95)';
        ctx.lineWidth = 4;
        ctx.shadowColor = 'rgba(255,110,110,0.65)';
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(burst.x, burst.y, burst.ring, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
        for (const s of burst.shards) {
          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.rotate(s.rot);
          ctx.globalAlpha = Math.max(0, s.life / 28);
          ctx.shadowColor = 'rgba(255,90,90,0.55)';
          ctx.shadowBlur = 10;
          const shardGrad = ctx.createLinearGradient(-s.size * 0.5, 0, s.size * 0.5, 0);
          shardGrad.addColorStop(0, '#ffb3b3');
          shardGrad.addColorStop(0.45, '#ff4d4d');
          shardGrad.addColorStop(1, '#6b1111');
          ctx.fillStyle = shardGrad;
          ctx.beginPath();
          ctx.moveTo(-s.size * 0.52, s.size * 0.26);
          ctx.lineTo(0, -s.size * 0.52);
          ctx.lineTo(s.size * 0.52, s.size * 0.26);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }
      if (deathBurst) {
        const alpha = Math.max(0, deathTimer / DEATH_FRAMES);
        const radius = 20 + deathBurst.pulse * 4;
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.strokeStyle = deathBurst.color;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(deathBurst.x, deathBurst.y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawHUD() {
      ctx.fillStyle = '#f8fafc';
      ctx.font = 'bold 18px Arial';
      ctx.fillText(`Ammo: ${player.infiniteAmmo ? 'INF' : player.ammo}`, 30, 42);

      if (isTimeTrialStage()) {
        const survived = getTimeTrialSeconds();
        const best = Math.max(timeTrialBestSeconds, timeTrialLastSeconds);
        ctx.fillText(`Time: ${formatClockSeconds(survived)}`, 30, 72);
        ctx.fillText(`Best: ${formatClockSeconds(best)}`, 30, 102);
        if (player.jumpBoostFrames > 0) ctx.fillText(`Jump Boost: ${Math.ceil(player.jumpBoostFrames / 60)}s`, 30, 132);

        const barX = 130, barY = H - 24, barW = W - 260, barH = 10;
        const difficulty = getTimeTrialDifficultyRank();
        const fill = clampValue(difficulty / 12, 0, 1);
        ctx.fillStyle = 'rgba(15, 23, 42, 0.25)';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.strokeStyle = 'rgba(255,255,255,0.14)';
        ctx.lineWidth = 2;
        ctx.strokeRect(barX, barY, barW, barH);
        ctx.fillStyle = '#22d3ee';
        ctx.fillRect(barX, barY, barW * fill, barH);

        ctx.fillStyle = '#e2e8f0';
        ctx.font = 'bold 14px Arial';
        ctx.fillText('TIME TRIAL', 30, H - 16);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#f8fafc';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(`Level ${difficulty}  •  ONE LIFE`, W - 30, H - 16);
        ctx.textAlign = 'left';
        return;
      }

      ctx.fillText(`Checkpoint: ${checkpointIndex + 1}/${CHECKPOINTS.length}`, 30, 72);
      if (boss && boss.entered) ctx.fillText(`Boss Shields: ${Math.max(0, bossShield)}`, 30, 102);
      else if (player.invincible > 0) ctx.fillText(`Invincible: ${Math.ceil(player.invincible / 60)}s`, 30, 102);
      if (player.jumpBoostFrames > 0) ctx.fillText(`Jump Boost: ${Math.ceil(player.jumpBoostFrames / 60)}s`, 30, 132);

      const barX = 130, barY = H - 24, barW = W - 260, barH = 10;
      const progress = Math.max(0, Math.min(1, worldDistance / LEVEL_DISTANCE));
      ctx.fillStyle = 'rgba(15, 23, 42, 0.25)';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.strokeStyle = 'rgba(255,255,255,0.14)';
      ctx.lineWidth = 2;
      ctx.strokeRect(barX, barY, barW, barH);
      ctx.fillStyle = '#22d3ee';
      ctx.fillRect(barX, barY, barW * progress, barH);
      for (let i = 0; i < CHECKPOINTS.length; i++) {
        const cpProgress = CHECKPOINTS[i] / LEVEL_DISTANCE;
        const markerX = barX + barW * cpProgress;
        ctx.fillStyle = i <= checkpointIndex ? '#86efac' : 'rgba(255,255,255,0.4)';
        ctx.fillRect(markerX - 2, H - 28, 4, 18);
      }

      if (getStageConfig().hasBoss !== false) {
        const bossProgress = BOSS_DISTANCE / LEVEL_DISTANCE;
        const bossMarkerX = barX + barW * bossProgress;
        ctx.fillStyle = boss && boss.entered ? '#fb7185' : 'rgba(251,113,133,0.85)';
        ctx.fillRect(bossMarkerX - 3, H - 31, 6, 24);
      }

      if (boss && boss.entered) {
        const aim = getAimDirection();
        const px = player.x + player.size / 2;
        const py = player.y + player.size / 2;
        ctx.save();
        ctx.strokeStyle = selectedMenuColor;
        ctx.globalAlpha = 0.35;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + aim.x * 100, py + aim.y * 100);
        ctx.stroke();
        ctx.restore();
      }

      ctx.fillStyle = '#e2e8f0';
      ctx.font = 'bold 14px Arial';
      ctx.fillText(getStageConfig().progressLabel, 30, H - 16);

      ctx.textAlign = 'right';
      ctx.fillStyle = '#f8fafc';
      ctx.font = 'bold 12px Arial';
      ctx.fillText(`${getSecondsLeft()}s left`, W - 30, H - 16);
      ctx.textAlign = 'left';

      row += 30;
    }
    ctx.fillStyle = 'rgba(223,247,255,0.82)';
    if (state === STATE_RUN || state === STATE_DEAD || state === STATE_BOSS_DEFEAT) {
      ctx.fillText('Shoot: X key / click / R2', 30, row);
    }
    ctx.restore();
  };

  function computeRunResult() {
    const elapsedMs = Math.max(1, performance.now() - (runStats.startMs || performance.now()));
    const elapsedSec = elapsedMs / 1000;
    const targetSec = Math.max(1, getStageConfig()?.beats ? (getStageConfig().beats / Math.max(1, getStageConfig().bpm / 60)) : elapsedSec);
    let stars = 1;
    if (runStats.deaths === 0) stars += 1;
    if (elapsedSec <= targetSec * 1.05) stars += 1;
    if (elapsedSec <= targetSec * 0.92 && runStats.deaths === 0) stars += 1;
    return {
      elapsedSec,
      targetSec,
      deaths: runStats.deaths,
      shots: runStats.shots,
      stars: Math.max(1, Math.min(4, stars))
    };
  }

  const __origSetWinState = setWinState;
  setWinState = function() {
    runStats.lastClearMs = performance.now();
    runStats.lastResult = computeRunResult();
    playUiConfirmSound();
    return __origSetWinState.apply(this, arguments);
  };

  drawWin = function finalDrawWin() {
    const cfg = getStageConfig();
    const result = runStats.lastResult || computeRunResult();
    const panelX = 168;
    const panelY = 72;
    const panelW = W - 336;
    const panelH = 246;
    const btnW = 236;
    const btnH = 42;
    const btnX = W / 2 - btnW / 2;
    const btnY = panelY + panelH - 58;
    winContinueRect = { x: btnX, y: btnY, w: btnW, h: btnH };

    ctx.fillStyle = 'rgba(8,24,18,0.9)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(10,30,20,0.94)';
    ctx.fillRect(panelX, panelY, panelW, panelH);
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 3;
    ctx.strokeRect(panelX, panelY, panelW, panelH);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#22c55e';
    ctx.font = 'bold 38px Arial';
    ctx.fillText('LEVEL COMPLETE', W / 2, panelY + 42);

    ctx.fillStyle = '#e2e8f0';
    ctx.font = 'bold 28px Arial';
    ctx.fillText(cfg.winTitle, W / 2, panelY + 82);

    let starText = '★'.repeat(result.stars) + '☆'.repeat(4 - result.stars);
    ctx.fillStyle = '#fde68a';
    ctx.font = 'bold 26px Arial';
    ctx.fillText(starText, W / 2, panelY + 116);

    ctx.fillStyle = '#cfe9ff';
    ctx.font = 'bold 16px Arial';
    ctx.fillText(`Time ${formatClockSeconds(Math.round(result.elapsedSec))}   •   Deaths ${result.deaths}   •   Shots ${result.shots}`, W / 2, panelY + 146);

    ctx.fillStyle = '#86efac';
    ctx.font = 'bold 14px Arial';
    ctx.fillText(`Progress saved • ${stageBossLabel(cfg)}`, W / 2, panelY + 170);

    const btnGrad = ctx.createLinearGradient(0, btnY, 0, btnY + btnH);
    btnGrad.addColorStop(0, '#49ffab');
    btnGrad.addColorStop(1, '#22c55e');
    ctx.fillStyle = btnGrad;
    ctx.strokeStyle = '#d8ffe6';
    ctx.lineWidth = 2;
    ctx.fillRect(btnX, btnY, btnW, btnH);
    ctx.strokeRect(btnX, btnY, btnW, btnH);

    ctx.fillStyle = '#052915';
    ctx.font = 'bold 22px Arial';
    ctx.fillText(getNextStage(currentStage) ? 'CONTINUE' : 'BACK TO LEVELS', W / 2, btnY + 28);

    ctx.textAlign = 'left';
  };

  canvas.addEventListener('mousedown', (e) => {
    if (state !== STATE_WIN) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width);
    const y = (e.clientY - rect.top) * (H / rect.height);
    const r = winContinueRect;
    if (r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
      e.preventDefault();
      e.stopImmediatePropagation();
      playUiConfirmSound();
      continueFromWin();
      return;
    }
    e.preventDefault();
    e.stopImmediatePropagation();
  }, true);

  window.addEventListener('keydown', (e) => {
    if (state !== 'paused') return;
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      pauseSelection = 0;
      e.preventDefault();
      e.stopImmediatePropagation();
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      pauseSelection = 1;
      e.preventDefault();
      e.stopImmediatePropagation();
    } else if (e.code === 'Enter' || e.code === 'Space') {
      e.preventDefault();
      e.stopImmediatePropagation();
      if (pauseSelection === 0) resumeGame();
      else resetToMenu();
    }
  }, true);

  const __origUpdateGamepad_debug = updateGamepad;
  updateGamepad = function() {
    const pad = getActivePad();
    if (state === 'paused') {
      if (!pad) {
        lastPadUp = false; lastPadDown = false; lastPadJump = false; lastPadShoot = false; lastPadMenu = false; lastPadAny = false;
        return;
      }
      const jumpPressed = buttonDown(pad.buttons[0]);
      const circlePressed = buttonDown(pad.buttons[1]);
      const menuPressed = buttonDown(pad.buttons[9]);
      const upPressed = buttonDown(pad.buttons[12]) || (pad.axes?.[1] ?? 0) < -0.35 || (pad.axes?.[3] ?? 0) < -0.35;
      const downPressed = buttonDown(pad.buttons[13]) || (pad.axes?.[1] ?? 0) > 0.35 || (pad.axes?.[3] ?? 0) > 0.35;

      if (upPressed && !lastPadUp) pauseSelection = 0;
      if (downPressed && !lastPadDown) pauseSelection = 1;
      if (jumpPressed && !lastPadJump) {
        if (pauseSelection === 0) resumeGame();
        else resetToMenu();
      }
      if (circlePressed && !lastPadShoot) resumeGame();
      if (menuPressed && !lastPadMenu) resumeGame();

      lastPadUp = upPressed;
      lastPadDown = downPressed;
      lastPadJump = jumpPressed;
      lastPadShoot = circlePressed;
      lastPadMenu = menuPressed;
      lastPadAny = jumpPressed || circlePressed || menuPressed || upPressed || downPressed;
      return;
    }
    return __origUpdateGamepad_debug.apply(this, arguments);
  };

  const __origDrawBackground_debug = drawBackground;
  drawBackground = function() {
    if (!window.bgImg) refreshBackground();
    if (window.bgLoaded) {
      const img = window.bgImg;
      const scaleBoost = Math.abs(stageTiltAngle) > 0.01 ? 1.12 : 1;
      const scale = Math.max(W / img.width, H / img.height) * scaleBoost;
      const drawW = img.width * scale;
      const drawH = img.height * scale;
      const y = (H - drawH) / 2;
      const normalized = clampValue(currentSpeed() / Math.max(0.01, currentBaseSpeed), 0.45, 1.4);
      const parallaxFactor = 0.16 + normalized * 0.08;
      const scroll = (worldDistance * parallaxFactor + frame * 0.35) % drawW;
      const intensity = getStageIntensity();

      ctx.drawImage(img, -scroll, y, drawW, drawH);
      ctx.drawImage(img, -scroll + drawW, y, drawW, drawH);
      if (scroll > 0) ctx.drawImage(img, -scroll - drawW, y, drawW, drawH);

      if (state === STATE_RUN) {
        const dangerAlpha = Math.max(0, intensity - 0.45) * 0.18 + (bossWarningTimer > 0 ? 0.08 : 0);
        if (dangerAlpha > 0.01) {
          const dangerGrad = ctx.createLinearGradient(0, 0, W, 0);
          dangerGrad.addColorStop(0, `rgba(255, 70, 70, ${dangerAlpha * 0.45})`);
          dangerGrad.addColorStop(0.5, 'rgba(255, 70, 70, 0)');
          dangerGrad.addColorStop(1, `rgba(255, 70, 70, ${dangerAlpha * 0.45})`);
          ctx.fillStyle = dangerGrad;
          ctx.fillRect(0, 0, W, H);
        }
      }

      const vignette = ctx.createLinearGradient(0, 0, 0, H);
      vignette.addColorStop(0, 'rgba(4,10,22,0.12)');
      vignette.addColorStop(0.55, 'rgba(6,12,24,0.01)');
      vignette.addColorStop(1, 'rgba(3,8,18,0.20)');
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, W, H);
    } else {
      return __origDrawBackground_debug.apply(this, arguments);
    }
  };

  const __origUpdateBoss_debug = updateBoss;
  updateBoss = function(speed) {
    const result = __origUpdateBoss_debug.apply(this, arguments);
    if (boss && boss.entered && state !== STATE_BOSS_DEFEAT) bossBarReveal = Math.min(1, bossBarReveal + 0.06);
    else bossBarReveal = Math.max(0, bossBarReveal - 0.08);
    return result;
  };

  const __origDraw_debug = draw;
  draw = function() {
    __origDraw_debug.apply(this, arguments);

    if (boss && boss.entered && !bossDefeatSequence && bossBarReveal < 0.999) {
      const panelX = 246;
      const panelY = 10;
      const panelW = 508;
      const panelH = 42;
      ctx.save();
      ctx.globalAlpha = 1 - bossBarReveal;
      ctx.fillStyle = 'rgba(8,17,31,0.95)';
      ctx.fillRect(panelX, panelY, panelW, panelH);
      ctx.restore();
    }

    if (state === STATE_BOSS_DEFEAT && bossDefeatSequence && bossDefeatSequence.flash > 0.01) {
      ctx.save();
      ctx.globalAlpha = Math.min(0.45, bossDefeatSequence.flash * 0.55);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  };

  const __origLayoutLevel1_final = layoutLevel1;
  layoutLevel1 = function finalCanonicalLayoutLevel1() {
    __origLayoutLevel1_final.apply(this, arguments);
    const cfg = LEVEL_CONFIGS[STAGE_LEVEL1];
    if (cfg) {
      cfg.hasBoss = true;
      cfg.menuSub = 'Full tutorial run • jumps, gun lane, glass, overdrive, boss';
      cfg.winSub = 'Press A to continue to Level 2';
    }
  };

  function addHandcraftedSetPiece(stage, beat, type) {
    const cfg = LEVEL_CONFIGS[stage];
    if (!cfg || currentStage !== stage) return;
    if (type === 'tower') {
      obstacles.push(createStep(beatX(beat), 286, 78, 54));
      obstacles.push(createStep(beatX(beat + 1.4), 258, 86, 82));
      obstacles.push(createStep(beatX(beat + 2.8), 226, 92, 114));
      obstacles.push(createStep(beatX(beat + 4.2), 196, 98, 144));
      pickups.push(createPickup(beatX(beat + 2.9), 186));
      enemies.push(createConeTarget(beatX(beat + 4.8), 26, 1));
    } else if (type === 'range') {
      for (let i = 0; i < 5; i++) obstacles.push(createStep(beatX(beat + i * 3), 292, 162, 48));
      for (let i = 0; i < 8; i++) enemies.push(createConeTarget(beatX(beat + 1 + i * 1.2), 24, 1));
      pickups.push(createPickup(beatX(beat + 2.4), 208));
      pickups.push(createPickup(beatX(beat + 7.6), 208));
    } else if (type === 'tunnel') {
      obstacles.push(createStep(beatX(beat), 292, 80, 48));
      obstacles.push(createStep(beatX(beat + 1.0), 248, 170, 18));
      obstacles.push(createStep(beatX(beat + 3.8), 248, 168, 18));
      obstacles.push(createStep(beatX(beat + 6.4), 292, 80, 48));
      powerUps.push(createPowerUp(beatX(beat + 2.4), GROUND - 108, 'jump'));
    }
  }

  const __origBuildProceduralCampaignLevel_final = buildProceduralCampaignLevel;
  buildProceduralCampaignLevel = function(stageConfig) {
    __origBuildProceduralCampaignLevel_final.apply(this, arguments);
    if (!stageConfig) return;
    if (stageConfig.stage === STAGE_LEVEL4) {
      addHandcraftedSetPiece(STAGE_LEVEL4, 54, 'range');
      addHandcraftedSetPiece(STAGE_LEVEL4, 108, 'tower');
    } else if (stageConfig.stage === STAGE_LEVEL5) {
      addHandcraftedSetPiece(STAGE_LEVEL5, 46, 'tower');
      addHandcraftedSetPiece(STAGE_LEVEL5, 118, 'tunnel');
    } else if (stageConfig.stage === STAGE_LEVEL6) {
      addHandcraftedSetPiece(STAGE_LEVEL6, 42, 'range');
      addHandcraftedSetPiece(STAGE_LEVEL6, 104, 'range');
    } else if (stageConfig.stage === STAGE_LEVEL7) {
      addHandcraftedSetPiece(STAGE_LEVEL7, 58, 'tower');
      addHandcraftedSetPiece(STAGE_LEVEL7, 126, 'tunnel');
    } else if (stageConfig.stage === STAGE_LEVEL8) {
      addHandcraftedSetPiece(STAGE_LEVEL8, 48, 'range');
      addHandcraftedSetPiece(STAGE_LEVEL8, 132, 'tower');
    } else if (stageConfig.stage === STAGE_LEVEL9) {
      addHandcraftedSetPiece(STAGE_LEVEL9, 60, 'tower');
      addHandcraftedSetPiece(STAGE_LEVEL9, 138, 'range');
    } else if (stageConfig.stage === STAGE_LEVEL10) {
      addHandcraftedSetPiece(STAGE_LEVEL10, 44, 'range');
      addHandcraftedSetPiece(STAGE_LEVEL10, 98, 'tower');
      addHandcraftedSetPiece(STAGE_LEVEL10, 154, 'tunnel');
    }
    sanitizeLevelLayout();
  };

})();
</script>


<script>
(() => {
  let level1ShootHintDismissed = false;
  let level1ShootHintAlpha = 0;

  const __origStartStage_finalPolish = startStage;
  startStage = function(stage) {
    level1ShootHintDismissed = false;
    level1ShootHintAlpha = 0;
    return __origStartStage_finalPolish.apply(this, arguments);
  };

  const __origShoot_finalPolish = shoot;
  shoot = function() {
    const before = bullets.length;
    const result = __origShoot_finalPolish.apply(this, arguments);
    if (currentStage === STAGE_LEVEL1 && bullets.length > before) {
      level1ShootHintDismissed = true;
    }
    return result;
  };

  const __origUpdate_finalPolish = update;
  update = function() {
    __origUpdate_finalPolish.apply(this, arguments);
    const shouldShowLevel1ShootHint =
      currentStage === STAGE_LEVEL1 &&
      state === STATE_RUN &&
      tutorialSection >= 6 &&
      tutorialSection < 8 &&
      !level1ShootHintDismissed;
    const target = shouldShowLevel1ShootHint ? 1 : 0;
    level1ShootHintAlpha += (target - level1ShootHintAlpha) * 0.14;
  };

  drawHUD = function finalCleanHud() {
    ctx.save();
    ctx.textAlign = 'left';
    ctx.fillStyle = '#f8fafc';
    ctx.font = 'bold 17px Arial';
    ctx.shadowColor = 'rgba(125, 211, 252, 0.28)';
    ctx.shadowBlur = 8;

    const pulse = 0.72 + Math.sin(frame * 0.16) * 0.28;
    const checkpointColor = `rgba(248,250,252,${Math.max(0.72, pulse)})`;
    let row = 42;

    ctx.fillText(`Ammo: ${player.infiniteAmmo ? 'INF' : player.ammo}`, 30, row);
    row += 30;

    if (isTimeTrialStage()) {
      ctx.fillText(`Time: ${formatClockSeconds(getTimeTrialSeconds())}`, 30, row);
      row += 30;
      ctx.fillText(`Best: ${formatClockSeconds(Math.max(timeTrialBestSeconds, timeTrialLastSeconds))}`, 30, row);
      row += 30;
      if (player.jumpBoostFrames > 0) {
        ctx.fillText(`Jump Boost: ${Math.ceil(player.jumpBoostFrames / 60)}s`, 30, row);
        row += 30;
      }
      if ((player.speedBoostFrames || 0) > 0) {
        ctx.fillText(`Overdrive: ${Math.ceil((player.speedBoostFrames || 0) / 60)}s`, 30, row);
        row += 30;
      }

      const barX = 130, barY = H - 24, barW = W - 260, barH = 10;
      const difficulty = getTimeTrialDifficultyRank();
      const fill = clampValue(difficulty / 12, 0, 1);
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(15, 23, 42, 0.18)';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.strokeStyle = 'rgba(255,255,255,0.14)';
      ctx.lineWidth = 2;
      ctx.strokeRect(barX, barY, barW, barH);
      ctx.fillStyle = '#22d3ee';
      ctx.fillRect(barX, barY, barW * fill, barH);
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#e2e8f0';
      ctx.font = 'bold 14px Arial';
      ctx.fillText('TIME TRIAL', 30, H - 16);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#f8fafc';
      ctx.font = 'bold 12px Arial';
      ctx.fillText(`Level ${difficulty}  •  ONE LIFE`, W - 30, H - 16);
      ctx.restore();
      return;
    }

    ctx.fillStyle = checkpointColor;
    ctx.fillText(`Checkpoint: ${Math.max(0, checkpointIndex + 1)}/${CHECKPOINTS.length}`, 30, row);
    row += 30;

    ctx.fillStyle = '#f8fafc';
    if (boss && boss.entered) {
      ctx.fillText(`Boss Shields: ${Math.max(0, bossShield)}`, 30, row);
      row += 30;
    } else if (player.invincible > 0) {
      ctx.fillText(`Invincible: ${Math.ceil(player.invincible / 60)}s`, 30, row);
      row += 30;
    }
    if (player.jumpBoostFrames > 0) {
      ctx.fillText(`Jump Boost: ${Math.ceil(player.jumpBoostFrames / 60)}s`, 30, row);
      row += 30;
    }
    if ((player.speedBoostFrames || 0) > 0) {
      ctx.fillText(`Overdrive: ${Math.ceil((player.speedBoostFrames || 0) / 60)}s`, 30, row);
      row += 30;
    }

    const barX = 130, barY = H - 24, barW = W - 260, barH = 10;
    const progress = Math.max(0, Math.min(1, worldDistance / LEVEL_DISTANCE));
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(15, 23, 42, 0.18)';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.strokeStyle = 'rgba(255,255,255,0.14)';
    ctx.lineWidth = 2;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#22d3ee';
    ctx.fillRect(barX, barY, barW * progress, barH);
    for (let i = 0; i < CHECKPOINTS.length; i++) {
      const cpProgress = CHECKPOINTS[i] / LEVEL_DISTANCE;
      const markerX = barX + barW * cpProgress;
      ctx.fillStyle = i <= checkpointIndex ? '#86efac' : 'rgba(255,255,255,0.4)';
      ctx.fillRect(markerX - 2, H - 28, 4, 18);
    }
    if (getStageConfig().hasBoss !== false) {
      const bossProgress = BOSS_DISTANCE / LEVEL_DISTANCE;
      const bossMarkerX = barX + barW * bossProgress;
      ctx.fillStyle = boss && boss.entered ? '#fb7185' : 'rgba(251,113,133,0.85)';
      ctx.fillRect(bossMarkerX - 3, H - 31, 6, 24);
    }

    if (boss && boss.entered) {
      const aim = getAimDirection();
      const px = player.x + player.size / 2;
      const py = player.y + player.size / 2;
      ctx.shadowBlur = 0;
      ctx.save();
      ctx.strokeStyle = selectedMenuColor;
      ctx.globalAlpha = 0.35;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + aim.x * 100, py + aim.y * 100);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  };

  const __origDrawTutorialPopup_finalPolish = drawTutorialPopup;
  drawTutorialPopup = function() {
    __origDrawTutorialPopup_finalPolish.apply(this, arguments);
    if (level1ShootHintAlpha < 0.03) return;
    ctx.save();
    ctx.globalAlpha = level1ShootHintAlpha;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(34, 211, 238, 0.28)';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#eaf8ff';
    ctx.font = 'bold 18px Arial';
    ctx.fillText('Press X to Shoot', W / 2, H - 56);
    ctx.font = 'bold 12px Arial';
    ctx.fillStyle = 'rgba(223,247,255,0.92)';
    ctx.fillText('This fades after your first shot', W / 2, H - 34);
    ctx.restore();
  };

  updateTutorialFlow = function finalLevel1TutorialFlow() {
    if (tutorialPopupTimer > 0) tutorialPopupTimer -= 1;
    const targetAlpha = tutorialPopupTimer > 0 ? 1 : 0;
    tutorialPopupAlpha += (targetAlpha - tutorialPopupAlpha) * 0.16;
    const targetScale = tutorialPopupTimer > 0 ? 1 : 0.96;
    tutorialPopupScale += (targetScale - tutorialPopupScale) * 0.14;

    const ammoVisible = !firstAmmoPopupSeen && pickups.some((p) => p.x > W * 0.44 && p.x < W - 70);
    const shieldVisible = !firstPowerPopupSeen && powerUps.some((p) => p.kind === 'shield' && p.x > W * 0.44 && p.x < W - 70);

    if (shieldVisible && tutorialPopupTimer < 70) {
      firstPowerPopupSeen = true;
      showTutorialPopup('Shield  •  blue power-up gives you protection for mistakes', 180);
      return;
    }
    if (ammoVisible && tutorialPopupTimer < 70) {
      firstAmmoPopupSeen = true;
      showTutorialPopup('Ammo  •  yellow drops refill your shots for combat sections', 170);
      return;
    }

    if (tutorialSection === 0 && worldDistance >= 2 * PIXELS_PER_BEAT) {
      showTutorialPopup('LEVEL 1  •  this run teaches jump, hazard, checkpoint, combat, and boss flow', 188);
      tutorialSection = 1;
    } else if (tutorialSection === 1 && worldDistance >= 14 * PIXELS_PER_BEAT) {
      showTutorialPopup('Jump with the beat  •  clear the opening step chain cleanly', 182);
      tutorialSection = 2;
    } else if (tutorialSection === 2 && worldDistance >= 18 * PIXELS_PER_BEAT) {
      showTutorialPopup('First enemy  •  easy kill, then keep moving forward', 180);
      tutorialSection = 3;
    } else if (tutorialSection === 3 && worldDistance >= 24 * PIXELS_PER_BEAT) {
      showTutorialPopup('Hazards  •  spikes punish bad timing, so stay centered on landings', 186);
      tutorialSection = 4;
    } else if (tutorialSection === 4 && worldDistance >= 46 * PIXELS_PER_BEAT) {
      showTutorialPopup('Tall climb  •  control your jump height and land on top of each step', 188);
      tutorialSection = 5;
    } else if (tutorialSection === 5 && worldDistance >= 74 * PIXELS_PER_BEAT) {
      player.ammo = Math.max(player.ammo, 24);
      showTutorialPopup('Checkpoint lane  •  recover, reload, and get ready to learn the gun', 190);
      tutorialSection = 6;
    } else if (tutorialSection === 6 && worldDistance >= 92 * PIXELS_PER_BEAT) {
      player.ammo = Math.max(player.ammo, 48);
      showTutorialPopup('Combat lane  •  press X to shoot, then hold your rhythm', 192);
      tutorialSection = 7;
    } else if (tutorialSection === 7 && worldDistance >= 144 * PIXELS_PER_BEAT) {
      player.infiniteAmmo = true;
      player.ammo = 999;
      showTutorialPopup('Boss next  •  dodge cleanly and fire at the core', 186);
      tutorialSection = 8;
    }
  };
})();
</script>
