<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geodash - 10 Level Campaign</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #08111f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .game-shell {
      width: min(100vw - 20px, calc((100vh - 20px) * 16 / 9), 1000px);
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border: 2px solid #22324f;
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(17, 34, 70, 0.95) 0%, rgba(8, 17, 31, 0.9) 18%, rgba(8, 17, 31, 0.88) 82%, rgba(17, 34, 70, 0.95) 100%);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }
    .game-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top center, rgba(126, 208, 255, 0.14), transparent 42%),
        radial-gradient(circle at bottom center, rgba(34, 255, 153, 0.08), transparent 40%);
      pointer-events: none;
    }
    canvas {
      width: 100%;
      height: 100%;
      background: #08111f;
      display: block;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <canvas id="game" width="1000" height="420" tabindex="0"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    function keepGamepadFocus() {
      try { window.focus(); } catch (err) {}
      try { canvas.focus({ preventScroll: true }); } catch (err) { try { canvas.focus(); } catch (err2) {} }
    }

    ['pointerdown','mousedown','touchstart','click'].forEach((eventName) => {
      window.addEventListener(eventName, keepGamepadFocus, { passive: true });
    });
    window.addEventListener('load', keepGamepadFocus);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) keepGamepadFocus();
    });

    const W = canvas.width;
    const H = canvas.height;
    const GROUND = 340;

    const STATE_HOME = 'home';
    const STATE_COLOR_MENU = 'color_menu';
    const STATE_LEVEL_SELECT = 'level_select';
    const STATE_MENU = 'menu';
    const STATE_RUN = 'run';
    const STATE_WIN = 'win';
    const STATE_DEAD = 'dead';
    const STATE_BOSS_DEFEAT = 'boss_defeat';

    const DEFAULT_BPM = 134;
    const PIXELS_PER_BEAT = 165;
    function bpmToBaseSpeed(bpm) {
      const beatSeconds = 60 / bpm;
      return PIXELS_PER_BEAT / (beatSeconds * 60);
    }
    let SPEEDUP_DISTANCE = 32 * PIXELS_PER_BEAT;
    let SPEEDUP_MULTIPLIER = 1.22;

    const STAGE_TUTORIAL = 'tutorial';
    const STAGE_LEVEL1 = 'level1';
    const STAGE_LEVEL2 = 'level2';
    const STAGE_LEVEL3 = 'level3';
    const STAGE_LEVEL4 = 'level4';
    const STAGE_LEVEL5 = 'level5';
    const STAGE_LEVEL6 = 'level6';
    const STAGE_LEVEL7 = 'level7';
    const STAGE_LEVEL8 = 'level8';
    const STAGE_LEVEL9 = 'level9';
    const STAGE_LEVEL10 = 'level10';
    const STAGE_ORDER = [
      STAGE_TUTORIAL,
      STAGE_LEVEL1,
      STAGE_LEVEL2,
      STAGE_LEVEL3,
      STAGE_LEVEL4,
      STAGE_LEVEL5,
      STAGE_LEVEL6,
      STAGE_LEVEL7,
      STAGE_LEVEL8,
      STAGE_LEVEL9,
      STAGE_LEVEL10,
    ];
    const PROGRESSION_STORAGE_KEY = 'geodash-progress-v1';
    const DEFAULT_UNLOCKED_STAGES = [STAGE_TUTORIAL, STAGE_LEVEL1];

    const LEVEL_CONFIGS = {
      [STAGE_TUTORIAL]: {
        label: 'TUTORIAL',
        menuTitle: 'SHOOTER DASH',
        bpm: DEFAULT_BPM,
        menuSub: '1-minute tutorial run • PS5 controller ready',
        beats: 134,
        checkpoints: [30, 62, 94],
        bossBeat: 112,
        bossHp: 16,
        bossW: 136,
        bossH: 118,
        bossBulletSpeed1: 4.9,
        bossBulletSpeed2: 5.6,
        bossFire1: [62, 24],
        bossFire2: [44, 24],
        speedupBeat: 33,
        speedupMultiplier: 1.5,
        musicFile: 'Sci Fi Space.mp3',
        progressLabel: 'TUTORIAL',
        winTitle: 'Tutorial Complete!',
        winSub: 'Press A to continue',
        backgroundFile: 'background.png',
        bossShieldCount: 2,
        difficultyRank: 0,
        enemyHpBonus: 0,
        layoutSeed: 0,
      },
      [STAGE_LEVEL1]: {
        label: 'LEVEL 1',
        menuTitle: 'GEODASH',
        bpm: DEFAULT_BPM,
        menuSub: 'Main level • full run',
        beats: 402,
        checkpoints: [40, 120, 200, 280],
        bossBeat: 335,
        bossHp: 36,
        bossW: 170,
        bossH: 150,
        bossBulletSpeed1: 6.8,
        bossBulletSpeed2: 7.9,
        bossFire1: [34, 22],
        bossFire2: [24, 20],
        speedupBeat: 32,
        speedupMultiplier: 1.22,
        musicFile: 'intro.mp3',
        progressLabel: 'LEVEL 1',
        winTitle: 'You Beat Level 1!',
        winSub: 'Press A to continue to Level 2',
        backgroundFile: 'lvl1.png',
        bossShieldCount: 2,
        difficultyRank: 1,
        enemyHpBonus: 0,
        layoutSeed: 1137,
      },
      [STAGE_LEVEL2]: {
        label: 'LEVEL 2',
        menuTitle: 'LEVEL 2',
        bpm: 157,
        menuSub: 'Harder run • tighter jumps and stronger enemies',
        beats: 402,
        checkpoints: [40, 120, 200, 280],
        bossBeat: 335,
        bossHp: 42,
        bossW: 190,
        bossH: 164,
        bossBulletSpeed1: 7.2,
        bossBulletSpeed2: 8.3,
        bossFire1: [26, 18],
        bossFire2: [18, 14],
        speedupBeat: 20,
        speedupMultiplier: 1.32,
        musicFile: '157anime.mp3',
        progressLabel: 'LEVEL 2',
        winTitle: 'You Beat Level 2!',
        winSub: 'Press A to continue to Level 3',
        backgroundFile: 'lvl2.png',
        bossShieldCount: 2,
        difficultyRank: 2,
        enemyHpBonus: 1,
        layoutSeed: 1274,
      }
    };

    const CAMPAIGN_BLUEPRINTS = [
      {
        stage: STAGE_LEVEL3,
        label: 'LEVEL 3',
        menuTitle: 'LEVEL 3',
        menuSub: 'Layered hazard chains and more air control checks',
        selectSubtitle: 'MORE HAZARDS',
      },
      {
        stage: STAGE_LEVEL4,
        label: 'LEVEL 4',
        menuTitle: 'LEVEL 4',
        bpm: 165,
        menuSub: '165 BPM pressure with bigger jumps and less recovery',
        selectSubtitle: 'RISING PRESSURE',
      },
      {
        stage: STAGE_LEVEL5,
        label: 'LEVEL 5',
        menuTitle: 'LEVEL 5',
        menuSub: 'Precision routes with denser spike timing',
        selectSubtitle: 'TIGHTER ROUTES',
      },
      {
        stage: STAGE_LEVEL6,
        label: 'LEVEL 6',
        menuTitle: 'LEVEL 6',
        menuSub: 'Heavy combat lanes with fewer safe shelves',
        selectSubtitle: 'HEAVY FIRE',
      },
      {
        stage: STAGE_LEVEL7,
        label: 'LEVEL 7',
        menuTitle: 'LEVEL 7',
        menuSub: 'Dark sector pacing with stacked mini tunnels',
        selectSubtitle: 'MIDNIGHT SECTOR',
      },
      {
        stage: STAGE_LEVEL8,
        label: 'LEVEL 8',
        menuTitle: 'LEVEL 8',
        menuSub: 'Boss prep gauntlets arrive earlier and hit harder',
        selectSubtitle: 'BOSS RUSH',
      },
      {
        stage: STAGE_LEVEL9,
        label: 'LEVEL 9',
        menuTitle: 'LEVEL 9',
        menuSub: 'End-run pressure with almost no wasted beats',
        selectSubtitle: 'FINAL CLIMB',
      },
      {
        stage: STAGE_LEVEL10,
        label: 'LEVEL 10',
        menuTitle: 'LEVEL 10',
        menuSub: 'Full-system endgame with max boss intensity',
        selectSubtitle: 'ENDGAME',
      },
    ];

    function checkpointPlanForBeats(beats) {
      return [
        Math.round(beats * 0.18),
        Math.round(beats * 0.39),
        Math.round(beats * 0.6),
        Math.round(beats * 0.78),
      ];
    }

    function buildCampaignConfig(levelNumber, blueprint) {
      const beats = 402 + Math.max(0, levelNumber - 2) * 10;
      const bossBeat = Math.round(beats * 0.833);
      const musicRotation = ['intro.mp3', 'level2.mp3', 'Sci Fi Space.mp3'];
      const bossFire1Base = Math.max(16, 36 - levelNumber * 2);
      const bossFire2Base = Math.max(11, 24 - levelNumber);
      return {
        stage: blueprint.stage,
        label: blueprint.label,
        menuTitle: blueprint.menuTitle,
        menuSub: blueprint.menuSub,
        selectSubtitle: blueprint.selectSubtitle,
        bpm: blueprint.bpm ?? (levelNumber <= 2 ? DEFAULT_BPM : DEFAULT_BPM + (levelNumber - 2) * 4),
        beats,
        checkpoints: checkpointPlanForBeats(beats),
        bossBeat,
        bossHp: 34 + levelNumber * 7 + (levelNumber >= 8 ? (levelNumber - 7) * 6 : 0),
        bossW: 170 + (levelNumber - 1) * 10,
        bossH: 150 + (levelNumber - 1) * 7,
        bossBulletSpeed1: 6.5 + levelNumber * 0.34 + (levelNumber >= 8 ? 0.6 : 0),
        bossBulletSpeed2: 7.4 + levelNumber * 0.38 + (levelNumber >= 8 ? 0.8 : 0),
        bossFire1: [bossFire1Base, Math.max(8, 22 - Math.floor(levelNumber / 2) - (levelNumber >= 8 ? 3 : 0))],
        bossFire2: [bossFire2Base, Math.max(6, 18 - Math.floor(levelNumber / 2) - (levelNumber >= 8 ? 3 : 0))],
        bossShieldCount: 2 + Math.floor((levelNumber - 1) / 3) + (levelNumber >= 9 ? 1 : 0),
        speedupBeat: Math.max(12, 34 - levelNumber * 2),
        speedupMultiplier: Number((1.18 + levelNumber * 0.03).toFixed(2)),
        musicFile: musicRotation[(levelNumber - 1) % musicRotation.length],
        progressLabel: blueprint.label,
        winTitle: `You Beat ${blueprint.label}!`,
        winSub: levelNumber < 10
          ? `Press A to continue to Level ${levelNumber + 1}`
          : 'Press A to return to level select',
        backgroundFile: `lvl${levelNumber}.png`,
        difficultyRank: levelNumber,
        enemyHpBonus: Math.floor((levelNumber - 1) / 2),
        layoutSeed: 1000 + levelNumber * 137,
        generationBeatStep: blueprint.generationBeatStep ?? (levelNumber >= 10 ? 2 : levelNumber >= 8 ? 3 : levelNumber >= 4 ? 3 : 4),
        generationSpanBeats: blueprint.generationSpanBeats ?? (levelNumber >= 10 ? 6 : levelNumber >= 8 ? 8 : levelNumber >= 4 ? 8 : 10),
        openingStepBursts: blueprint.openingStepBursts ?? (levelNumber >= 10 ? 3 : levelNumber >= 8 ? 2 : levelNumber >= 4 ? 2 : 1),
        lateGameBursts: blueprint.lateGameBursts ?? (levelNumber >= 10 ? 5 : levelNumber >= 8 ? 3 : levelNumber >= 4 ? 1 : 0),
        preBossBeatStep: blueprint.preBossBeatStep ?? (levelNumber >= 10 ? 1 : levelNumber >= 4 ? 1 : 2),
      };
    }

    CAMPAIGN_BLUEPRINTS.forEach((blueprint, index) => {
      const levelNumber = index + 3;
      LEVEL_CONFIGS[blueprint.stage] = buildCampaignConfig(levelNumber, blueprint);
    });

    let currentStage = STAGE_TUTORIAL;
    let currentBpm = LEVEL_CONFIGS[currentStage].bpm ?? DEFAULT_BPM;
    let currentBaseSpeed = bpmToBaseSpeed(currentBpm);
    let LEVEL_BEATS = LEVEL_CONFIGS[currentStage].beats;
    let LEVEL_DISTANCE = LEVEL_BEATS * PIXELS_PER_BEAT;
    let CHECKPOINTS = LEVEL_CONFIGS[currentStage].checkpoints.map(b => b * PIXELS_PER_BEAT);
    let BOSS_DISTANCE = LEVEL_CONFIGS[currentStage].bossBeat * PIXELS_PER_BEAT;

    const PLAYER_SIZE = 72;
    const GRAVITY = 0.92;
    const JUMP_FORCE = -15.2;
    const JUMP_BOOST_BEATS = 10;
    const JUMP_BOOST_FORCE_MULTIPLIER = 1.24;
    const JUMP_BOOST_AIR_MULTIPLIER = 1.08;
    const JUMP_BOOST_GRAVITY_MULTIPLIER = 0.84;
    const BULLET_SPEED = 12;
    const SHOOT_COOLDOWN = 7;
    const DEATH_FRAMES = 20;
    const INVINCIBLE_FRAMES = 15 * 60;

    const bgMusic = new Audio(LEVEL_CONFIGS[currentStage].musicFile);
    bgMusic.loop = true;
    bgMusic.volume = 0.6;
    bgMusic.preload = 'auto';

    const shootSound = new Audio('shoot.wav');
    shootSound.preload = 'auto';
    shootSound.volume = 0.28;

    const missileSound = new Audio('missile.wav');
    missileSound.preload = 'auto';
    missileSound.volume = 0.4;

    const playerImg = new Image();
    let playerSpriteLoaded = false;
    playerImg.onload = () => { playerSpriteLoaded = true; };
    playerImg.onerror = () => { playerSpriteLoaded = false; };
    playerImg.src = 'player.png';

    const menuBgImg = new Image();
    let menuBgLoaded = false;
    menuBgImg.onload = () => { menuBgLoaded = true; };
    menuBgImg.onerror = () => { menuBgLoaded = false; };
    menuBgImg.src = 'menu.png';

    const MENU_COLOR_OPTIONS = ['#22ff99', '#38bdf8', '#a855f7', '#fde047', '#ff5a4a', '#ffffff'];
    const DEFAULT_MENU_COLOR = MENU_COLOR_OPTIONS[0];
    let selectedMenuColor = DEFAULT_MENU_COLOR;
    let unlockedColors = new Set([DEFAULT_MENU_COLOR]);
    let colorMenuReturnState = STATE_HOME;
    let colorMenuMode = 'normal';
    let colorMenuRewardColor = null;
    let menuPreviewJump = 0;
    let levelScrollIndex = 0;
    let homeSelectedIndex = 0;
    let colorSelectedIndex = 0;
    let levelSelectedIndex = 0;
    const HOME_BUTTONS = [
      { id: 'play', label: 'PLAY' },
      { id: 'color', label: 'CHANGE COLOR' },
      { id: 'levels', label: 'LEVEL SELECT' }
    ];
    let homeButtonRects = [];
    let colorButtonRects = [];
    let levelCardRects = [];
    let levelScrollUpRect = null;
    let levelScrollDownRect = null;
    const LEVEL_SELECT_ITEMS = [
      { label: 'TUTORIAL', subtitle: 'LEARN THE BASICS', stage: STAGE_TUTORIAL, locked: false, complete: false },
      { label: 'LEVEL 1', subtitle: 'FIRST REAL RUN', stage: STAGE_LEVEL1, locked: false, complete: false },
      { label: 'LEVEL 2', subtitle: 'FASTER PATTERNS', stage: STAGE_LEVEL2, locked: true, complete: false },
      { label: 'LEVEL 3', subtitle: 'MORE HAZARDS', stage: STAGE_LEVEL3, locked: true, complete: false },
      { label: 'LEVEL 4', subtitle: 'RISING PRESSURE', stage: STAGE_LEVEL4, locked: true, complete: false },
      { label: 'LEVEL 5', subtitle: 'TIGHTER ROUTES', stage: STAGE_LEVEL5, locked: true, complete: false },
      { label: 'LEVEL 6', subtitle: 'HEAVY FIRE', stage: STAGE_LEVEL6, locked: true, complete: false },
      { label: 'LEVEL 7', subtitle: 'MIDNIGHT SECTOR', stage: STAGE_LEVEL7, locked: true, complete: false },
      { label: 'LEVEL 8', subtitle: 'BOSS RUSH', stage: STAGE_LEVEL8, locked: true, complete: false },
      { label: 'LEVEL 9', subtitle: 'FINAL CLIMB', stage: STAGE_LEVEL9, locked: true, complete: false },
      { label: 'LEVEL 10', subtitle: 'ENDGAME', stage: STAGE_LEVEL10, locked: true, complete: false }
    ];
    const savedProgress = loadProgressState();
    let unlockedStages = new Set(savedProgress.unlockedStages);
    let completedStages = new Set(savedProgress.completedStages);
    unlockedColors = new Set(savedProgress.unlockedColors || [DEFAULT_MENU_COLOR]);
    selectedMenuColor = savedProgress.selectedMenuColor || DEFAULT_MENU_COLOR;
    ensureSelectedColorIsUnlocked();
    syncLevelSelectItems();

    let state = STATE_HOME;
    let frame = 0;
    let worldDistance = 0;
    let checkpointIndex = -1;
    let deathTimer = 0;
    let deathBurst = null;
    let speedupTriggered = false;
    let musicStarted = false;
    let preservedMusicTime = null;
    let keys = {};
    let checkpointSnapshot = null;
    let gamepadIndex = null;
    let lastPadJump = false;
    let lastPadShoot = false;
    let lastPadMenu = false;
    let lastPadAny = false;
    let lastPadTriangle = false;
    let lastPadSquare = false;
    let pauseSelection = 0;
    let bossShield = 0;
    let bossJustDefeated = false;
    let mouseAim = { x: W - 120, y: H / 2 };
    let cheatBuffer = [];
    const CHEAT_CODE = ['circle','circle','circle','square'];
    let levelSelectCheatBuffer = [];
    const LEVEL_SELECT_UNLOCK_CODE = ['triangle','triangle','triangle','square'];
    let pauseButtons = [];
    let enemyPopBursts = [];
    let runtimeError = null;
    let cinematicTimeScale = 1;
    let bossDefeatSequence = null;
    let bossCheckpointSnapshot = null;
    let diedInBossFight = false;
    let tutorialPopup = '';
    let tutorialPopupTimer = 0;
    let tutorialSection = 0;
    let miniTutorialSeen = false;
    let firstAmmoPopupSeen = false;
    let firstPowerPopupSeen = false;

    const player = {
      x: 140,
      y: GROUND - PLAYER_SIZE,
      size: PLAYER_SIZE,
      baseSize: PLAYER_SIZE,
      minSize: 34,
      targetSize: PLAYER_SIZE,
      vy: 0,
      grounded: true,
      rotation: 0,
      ammo: 0,
      shootCooldown: 0,
      invincible: 0,
      jumpBoostFrames: 0,
      jumpsUsed: 0,
      infiniteAmmo: false
    };

    let obstacles = [];
    let enemies = [];
    let pickups = [];
    let powerUps = [];
    let bullets = [];
    let particles = [];
    let boss = null;
    let bossBullets = [];
    let enemyBullets = [];


    function loadProgressState() {
      const fallback = {
        unlockedStages: [...DEFAULT_UNLOCKED_STAGES],
        completedStages: [],
        lastSelectedStage: STAGE_TUTORIAL,
        unlockedColors: [DEFAULT_MENU_COLOR],
        selectedMenuColor: DEFAULT_MENU_COLOR,
      };

      try {
        const raw = localStorage.getItem(PROGRESSION_STORAGE_KEY);
        if (!raw) {
          return fallback;
        }

        const parsed = JSON.parse(raw);
        const unlockedStages = Array.isArray(parsed?.unlockedStages)
          ? parsed.unlockedStages.filter((stage) => LEVEL_CONFIGS[stage])
          : fallback.unlockedStages;
        const completedStages = Array.isArray(parsed?.completedStages)
          ? parsed.completedStages.filter((stage) => LEVEL_CONFIGS[stage])
          : [];
        const unlockedColors = Array.isArray(parsed?.unlockedColors)
          ? parsed.unlockedColors.filter((color) => MENU_COLOR_OPTIONS.includes(color))
          : fallback.unlockedColors;
        const normalizedUnlocks = Array.from(new Set([...DEFAULT_UNLOCKED_STAGES, ...unlockedStages]));
        const normalizedColorUnlocks = Array.from(new Set([DEFAULT_MENU_COLOR, ...unlockedColors]));
        const selectedColor = normalizedColorUnlocks.includes(parsed?.selectedMenuColor)
          ? parsed.selectedMenuColor
          : (normalizedColorUnlocks.includes(parsed?.selectedColor) ? parsed.selectedColor : normalizedColorUnlocks[0]);
        return {
          unlockedStages: normalizedUnlocks,
          completedStages: Array.from(new Set(completedStages)),
          lastSelectedStage: LEVEL_CONFIGS[parsed?.lastSelectedStage] ? parsed.lastSelectedStage : STAGE_TUTORIAL,
          unlockedColors: normalizedColorUnlocks,
          selectedMenuColor: selectedColor,
        };
      } catch (err) {
        return fallback;
      }
    }

    function syncLevelSelectItems() {
      LEVEL_SELECT_ITEMS.forEach((item) => {
        item.locked = !unlockedStages.has(item.stage);
        item.complete = completedStages.has(item.stage);
      });
    }

    function persistProgressState(selectedStage = currentStage) {
      syncLevelSelectItems();
      ensureSelectedColorIsUnlocked();
      const unlockedColorList = MENU_COLOR_OPTIONS.filter((color) => unlockedColors.has(color));
      try {
        localStorage.setItem(
          PROGRESSION_STORAGE_KEY,
          JSON.stringify({
            unlockedStages: [...unlockedStages],
            completedStages: [...completedStages],
            lastSelectedStage: selectedStage,
            unlockedColors: unlockedColorList,
            selectedMenuColor,
          }),
        );
      } catch (err) {}
    }

    function getStageIndex(stage) {
      return STAGE_ORDER.indexOf(stage);
    }

    function getNextStage(stage) {
      const stageIndex = getStageIndex(stage);
      if (stageIndex === -1 || stageIndex >= STAGE_ORDER.length - 1) {
        return null;
      }
      return STAGE_ORDER[stageIndex + 1];
    }

    function isStageUnlocked(stage) {
      return unlockedStages.has(stage);
    }

    function markStageComplete(stage) {
      completedStages.add(stage);
      const nextStage = getNextStage(stage);
      if (nextStage) {
        unlockedStages.add(nextStage);
      }
      persistProgressState(stage);
    }

    function getHighestUnlockedStage() {
      for (let index = STAGE_ORDER.length - 1; index >= 0; index -= 1) {
        if (unlockedStages.has(STAGE_ORDER[index])) {
          return STAGE_ORDER[index];
        }
      }
      return STAGE_TUTORIAL;
    }

    function unlockAllLevelsCheat() {
      STAGE_ORDER.forEach((stage) => unlockedStages.add(stage));
      syncLevelSelectItems();
      persistProgressState(currentStage);
      levelSelectCheatBuffer = [];
    }

    function getUnlockedColorList() {
      return MENU_COLOR_OPTIONS.filter((color) => unlockedColors.has(color));
    }

    function ensureSelectedColorIsUnlocked() {
      if (!unlockedColors.has(DEFAULT_MENU_COLOR)) {
        unlockedColors.add(DEFAULT_MENU_COLOR);
      }
      if (!unlockedColors.has(selectedMenuColor)) {
        selectedMenuColor = getUnlockedColorList()[0] || DEFAULT_MENU_COLOR;
      }
    }

    function setSelectedMenuColor(color) {
      if (!unlockedColors.has(color)) {
        return false;
      }
      selectedMenuColor = color;
      persistProgressState(currentStage);
      return true;
    }

    function unlockNextColorReward(stage = currentStage) {
      if (getStageIndex(stage) < getStageIndex(STAGE_LEVEL4)) {
        return null;
      }
      const nextColor = MENU_COLOR_OPTIONS.find((color) => !unlockedColors.has(color));
      if (!nextColor) {
        return null;
      }
      unlockedColors.add(nextColor);
      ensureSelectedColorIsUnlocked();
      persistProgressState(stage);
      return nextColor;
    }

    function focusLevelSelectOnStage(stage = getHighestUnlockedStage()) {
      const targetIndex = Math.max(0, LEVEL_SELECT_ITEMS.findIndex((item) => item.stage === stage));
      const maxStart = Math.max(0, LEVEL_SELECT_ITEMS.length - 4);
      levelScrollIndex = Math.max(0, Math.min(targetIndex - 1, maxStart));
      levelSelectedIndex = Math.max(0, Math.min(3, targetIndex - levelScrollIndex));
    }

    function setWinState() {
      if (state === STATE_WIN) {
        return;
      }
      markStageComplete(currentStage);
      const unlockedColor = unlockNextColorReward(currentStage);
      if (unlockedColor) {
        openColorMenu({
          returnState: STATE_WIN,
          mode: 'reward',
          focusColor: unlockedColor,
        });
        return;
      }
      state = STATE_WIN;
    }

    function openHomeMenu() {
      try {
        bgMusic.pause();
      } catch (err) {}
      levelSelectCheatBuffer = [];
      lastPadTriangle = false;
      lastPadSquare = false;
      colorMenuReturnState = STATE_HOME;
      colorMenuMode = 'normal';
      colorMenuRewardColor = null;
      homeSelectedIndex = 0;
      state = STATE_HOME;
    }

    function openColorMenu(options = {}) {
      colorMenuReturnState = options.returnState ?? STATE_HOME;
      colorMenuMode = options.mode ?? 'normal';
      colorMenuRewardColor = options.focusColor ?? null;
      ensureSelectedColorIsUnlocked();
      const preferredColor = colorMenuRewardColor && unlockedColors.has(colorMenuRewardColor)
        ? colorMenuRewardColor
        : selectedMenuColor;
      colorSelectedIndex = Math.max(0, MENU_COLOR_OPTIONS.indexOf(preferredColor));
      if (!unlockedColors.has(MENU_COLOR_OPTIONS[colorSelectedIndex])) {
        const firstUnlocked = MENU_COLOR_OPTIONS.findIndex((color) => unlockedColors.has(color));
        colorSelectedIndex = Math.max(0, firstUnlocked);
      }

    function playSfx(baseAudio, volume = null) {

    function snapBeat(n) {
      return Math.round(n / PIXELS_PER_BEAT) * PIXELS_PER_BEAT;
    }

    function currentSpeed() {
      return currentBaseSpeed * (speedupTriggered ? SPEEDUP_MULTIPLIER : 1);

    function clone(data) {

    }

    function createStep(x, y, w, h) {
      return { type: 'step', x: snapBeat(x), y, w, h };
    }

    function createSpike(x, size = 40) {
      return { type: 'spike', x: snapBeat(x), y: GROUND, w: size, h: size };
    }

    function createEnemy(x, size = 42, hp = 3) {
      return {
        type: 'enemy',
        x: snapBeat(x),
        y: GROUND,
        w: size,
        h: size,
        hp,
        maxHp: hp,
        shootCooldown: 120 + Math.random() * 120,
        offsetY: 0,
        vy: 0,
        shake: 0
      };
    }

    function createPickup(x, y = GROUND - 16) {
      return { x: snapBeat(x), y, r: 10 };
    }

    function createPowerUp(x, y = GROUND - 90, kind = 'shield') {
      return { x: snapBeat(x), y, r: 16, pulse: 0, kind };
    }

    
function createBoss() {
  const cfg = getStageConfig();
  return {
    active: true,
    x: W + 220,
    y: 240,
    w: cfg.bossW,
    h: cfg.bossH,
    hp: cfg.bossHp,
    maxHp: cfg.bossHp,
    phase: 1,
    pulse: 0,
    entered: false,

  };
}

    function beatX(beat) {
      return beat * PIXELS_PER_BEAT;
    }

    function createRng(seed) {
      let value = seed >>> 0;
      return () => {
        value = (value * 1664525 + 1013904223) >>> 0;
        return value / 4294967296;
      };
    }

    function getDifficultyRank(stageConfig = getStageConfig()) {
      return Math.max(0, stageConfig.difficultyRank ?? 0);
    }

    function createScaledEnemyAtBeat(beat, stageConfig, random = Math.random, options = {}) {
      const difficulty = getDifficultyRank(stageConfig);
      const sizeBase = options.sizeBase ?? 42;
      const hpBase = options.hpBase ?? 3;
      const size = sizeBase + Math.min(16, difficulty * 2) + Math.floor(random() * 4);
      const hp = hpBase + Math.floor(difficulty / 2) + (stageConfig.enemyHpBonus ?? 0);
      return createEnemy(beatX(beat), size, hp);
    }

    function pickupLaneY(difficulty, bonus = 0) {
      return Math.max(188, 220 - difficulty * 4 + bonus);
    }

    function addCampaignOpening(stageConfig, random = Math.random) {
      const difficulty = getDifficultyRank(stageConfig);
      const rise = Math.min(26, difficulty * 3);
      const openingStepBursts = stageConfig.openingStepBursts ?? 1;

      obstacles.push(createSpike(beatX(6), 38 + Math.min(8, difficulty)));
      obstacles.push(createStep(beatX(8), 292, 72, 48));
      obstacles.push(createStep(beatX(10), 276 - rise * 0.3, 78, 64));
      obstacles.push(createStep(beatX(12), 252 - rise * 0.55, 86, 90));
      obstacles.push(createSpike(beatX(15), 40 + Math.min(10, difficulty)));
      obstacles.push(createStep(beatX(18), 292, 72, 48));
      obstacles.push(createStep(beatX(20), 268 - rise * 0.2, 84, 74));
      obstacles.push(createStep(beatX(22), 244 - rise * 0.45, 92, 102));
      obstacles.push(createSpike(beatX(25), 40 + Math.min(10, difficulty)));
      obstacles.push(createStep(beatX(28), 292, 76, 48));

      enemies.push(createScaledEnemyAtBeat(13.2, stageConfig, random, { hpBase: 3 }));
      enemies.push(createScaledEnemyAtBeat(23.6, stageConfig, random, { hpBase: 4 }));
      pickups.push(createPickup(beatX(9), pickupLaneY(difficulty)));
      pickups.push(createPickup(beatX(14), pickupLaneY(difficulty, -16)));
      pickups.push(createPickup(beatX(21), pickupLaneY(difficulty, -8)));

      if (difficulty >= 5) {
        obstacles.push(createStep(beatX(31), 256, 152, 20));
        obstacles.push(createStep(beatX(33.5), 246, 144, 20));
        pickups.push(createPickup(beatX(32), pickupLaneY(difficulty, -18)));
      }

      if (openingStepBursts >= 2) {
        obstacles.push(createStep(beatX(35), 234 - rise * 0.5, 104, 92));
        obstacles.push(createSpike(beatX(37), 38 + Math.min(10, difficulty)));
        enemies.push(createScaledEnemyAtBeat(36.4, stageConfig, random, { sizeBase: 44, hpBase: 4 + Math.floor(difficulty / 3) }));
      }

      if (openingStepBursts >= 3) {
        obstacles.push(createStep(beatX(39), 214 - rise * 0.6, 112, 108));
        obstacles.push(createStep(beatX(41), 246 - rise * 0.45, 90, 76));
        obstacles.push(createSpike(beatX(43), 40 + Math.min(10, difficulty)));
        enemies.push(createScaledEnemyAtBeat(42.3, stageConfig, random, { sizeBase: 46, hpBase: 5 + Math.floor(difficulty / 3) }));
      }
    }

    function addLateGameBurst(startBeat, stageConfig, random = Math.random) {
      const difficulty = getDifficultyRank(stageConfig);
      const stepCount = difficulty >= 10 ? 7 : difficulty >= 9 ? 6 : 5;
      const beatGap = difficulty >= 10 ? 1.25 : 1.5;
      const baseWidth = Math.max(40, 80 - difficulty * 2);
      let burstBeat = startBeat;

      for (let i = 0; i < stepCount; i += 1) {
        const lift = 18 + i * (8 + Math.floor(difficulty / 2));
        const y = Math.max(170, 292 - lift + Math.floor(random() * 8));
        const x = beatX(burstBeat);
        obstacles.push(createStep(x, y, Math.max(42, baseWidth - (i % 2) * 8), 40 + (i % 3) * 6));
        if (i % 2 === 0) {
          obstacles.push(createSpike(x + 0.6 * PIXELS_PER_BEAT, 34 + Math.min(12, difficulty)));
        }
        if (i % 3 === 1) {
          enemies.push(createScaledEnemyAtBeat(burstBeat + 0.7, stageConfig, random, { sizeBase: 40, hpBase: 5 + Math.floor(difficulty / 3) }));
        }
        burstBeat += beatGap;
      }
    }

    function addCheckpointPowerUps(stageConfig) {
      const difficulty = getDifficultyRank(stageConfig);
      stageConfig.checkpoints.forEach((checkpointBeat, index) => {
        const lead = Math.max(4, 6 - Math.floor(difficulty / 4));
        const isJumpBoost = difficulty >= 4 && (index === 1 || (difficulty >= 8 && index === 3));
        const kind = isJumpBoost ? 'jump' : 'shield';
        const y = isJumpBoost ? GROUND - 118 - (index % 2) * 6 : GROUND - 94 - (index % 2) * 12;
        powerUps.push(createPowerUp(beatX(checkpointBeat - lead), y, kind));
      });
    }

    function buildProceduralCampaignLevel(stageConfig) {
      const random = createRng(stageConfig.layoutSeed ?? 1);
      const difficulty = getDifficultyRank(stageConfig);
      obstacles = [];
      enemies = [];
      pickups = [];
      powerUps = [];

      addCampaignOpening(stageConfig, random);

      let beat = 34;
      const midSectionEnd = Math.max(beat + 16, stageConfig.bossBeat - 18);
      const sectionSpan = stageConfig.generationSpanBeats ?? Math.max(6, 24 - difficulty * 2);
      while (beat < midSectionEnd) {
        const nextBeat = Math.min(midSectionEnd, beat + sectionSpan + Math.floor(random() * 2) * (difficulty >= 8 ? 2 : 4));
        addGeneratedSection(beat, nextBeat, { stageConfig, random });
        beat = nextBeat;
      }

      if ((stageConfig.lateGameBursts ?? 0) > 0) {
        const burstCount = stageConfig.lateGameBursts;
        const burstStart = 44;
        const burstEnd = Math.max(burstStart + 12, stageConfig.bossBeat - 48);
        const burstSpacing = Math.max(12, Math.floor((burstEnd - burstStart) / burstCount));
        for (let i = 0; i < burstCount; i += 1) {
          addLateGameBurst(burstStart + i * burstSpacing, stageConfig, random);
        }
      }

      addPreBossSection(Math.max(beat, stageConfig.bossBeat - 18), stageConfig.bossBeat + 8, { stageConfig, random });
      addCheckpointPowerUps(stageConfig);
      fixPickupOverlaps();
      fixEnemyOverlaps();
    }

    function addGeneratedSection(startBeat, endBeat, options = {}) {
      const stageConfig = options.stageConfig ?? getStageConfig();
      const random = options.random ?? Math.random;
      const difficulty = getDifficultyRank(stageConfig);
      const beatStep = stageConfig.generationBeatStep ?? (difficulty >= 10 ? 2 : difficulty >= 8 ? 3 : 4);

      for (let beat = startBeat; beat < endBeat; beat += beatStep) {
        const x = beatX(beat);
        const rand = Math.floor(random() * 8);
        const extraLift = Math.min(32, difficulty * 3);
        const enemyHpBase = 3 + Math.floor(difficulty / 3);
        const pickupHeight = pickupLaneY(difficulty);

        if (rand === 0) {
          obstacles.push(createStep(x, 292, 68, 48));
          obstacles.push(createStep(x + 2 * PIXELS_PER_BEAT, 262 - extraLift * 0.4 + random() * 26, 78, 82));
          if (difficulty >= 8) {
            obstacles.push(createStep(x + 3 * PIXELS_PER_BEAT, 238 - extraLift * 0.5, 72, 94));
          }
          pickups.push(createPickup(x + PIXELS_PER_BEAT, pickupHeight));
        } else if (rand === 1) {
          obstacles.push(createSpike(x, 38 + Math.min(10, difficulty)));
          obstacles.push(createSpike(x + PIXELS_PER_BEAT, 38 + Math.min(10, difficulty)));
          if (difficulty >= 8) {
            obstacles.push(createStep(x + 2 * PIXELS_PER_BEAT, 268 - extraLift * 0.3, 64, 74));
          }
          enemies.push(createScaledEnemyAtBeat(beat + 2.2, stageConfig, random, { hpBase: enemyHpBase }));
        } else if (rand === 2) {
          obstacles.push(createStep(x, 242 - extraLift * 0.35, 90, 104));
          obstacles.push(createStep(x + PIXELS_PER_BEAT, 292, 70, 48));
          if (difficulty >= 8) {
            obstacles.push(createStep(x + 2 * PIXELS_PER_BEAT, 224 - extraLift * 0.5, 84, 116));
          }
          pickups.push(createPickup(x, pickupHeight - 10));
        } else if (rand === 3) {
          obstacles.push(createStep(x, 292, 70, 48));
          enemies.push(createScaledEnemyAtBeat(beat + 1.4, stageConfig, random, { sizeBase: 44, hpBase: enemyHpBase + 1 }));
          obstacles.push(createSpike(x + 3 * PIXELS_PER_BEAT, 40 + Math.min(8, difficulty)));
          if (difficulty >= 8) {
            obstacles.push(createStep(x + PIXELS_PER_BEAT, 260 - extraLift * 0.25, 74, 78));
          }
        } else if (rand === 4) {
          obstacles.push(createSpike(x + PIXELS_PER_BEAT, 38 + Math.min(10, difficulty)));
          obstacles.push(createStep(x + 2 * PIXELS_PER_BEAT, 252 - extraLift * 0.25, 80, 92));
          if (difficulty >= 8) {
            obstacles.push(createStep(x + 3 * PIXELS_PER_BEAT, 230 - extraLift * 0.4, 72, 102));
          }
          pickups.push(createPickup(x + 2 * PIXELS_PER_BEAT, pickupHeight - 18));
        } else if (rand === 5) {
          obstacles.push(createStep(x, 292, 72, 48));
          obstacles.push(createStep(x + PIXELS_PER_BEAT, 272 - extraLift * 0.2, 70, 68));
          if (difficulty >= 8) {
            obstacles.push(createStep(x + 2 * PIXELS_PER_BEAT, 250 - extraLift * 0.45, 82, 88));
          }
          enemies.push(createScaledEnemyAtBeat(beat + 2.2, stageConfig, random, { sizeBase: 44, hpBase: enemyHpBase + 1 }));
        } else if (rand === 6) {
          obstacles.push(createSpike(x, 38 + Math.min(10, difficulty)));
          obstacles.push(createStep(x + PIXELS_PER_BEAT, 262 - extraLift * 0.25, 80, 84));
          obstacles.push(createStep(x + 2 * PIXELS_PER_BEAT, 232 - extraLift * 0.4, 100, 112));
          if (difficulty >= 8) {
            obstacles.push(createSpike(x + 3 * PIXELS_PER_BEAT, 34 + Math.min(12, difficulty)));
          }
        } else {
          obstacles.push(createStep(x, 292, 70, 48));
          obstacles.push(createSpike(x + 2 * PIXELS_PER_BEAT, 40 + Math.min(8, difficulty)));
          if (difficulty >= 8) {
            obstacles.push(createStep(x + PIXELS_PER_BEAT, 264 - extraLift * 0.3, 76, 76));
          }
          enemies.push(createScaledEnemyAtBeat(beat + 3.1, stageConfig, random, { hpBase: enemyHpBase }));
        }

        if (difficulty >= 6 && random() > 0.55) {
          pickups.push(createPickup(x + 2 * PIXELS_PER_BEAT, pickupHeight - 24));
        }
        if (difficulty >= 8 && random() > 0.7) {
          enemies.push(createScaledEnemyAtBeat(beat + 3.4, stageConfig, random, { sizeBase: 40, hpBase: enemyHpBase }));
        }
      }
    }

    function addPreBossSection(startBeat, endBeat, options = {}) {
      const stageConfig = options.stageConfig ?? getStageConfig();
      const random = options.random ?? Math.random;
      const difficulty = getDifficultyRank(stageConfig);
      const beatStep = stageConfig.preBossBeatStep ?? (difficulty >= 10 ? 1 : 2);
      for (let beat = startBeat; beat < endBeat; beat += beatStep) {
        const x = beatX(beat);
        const pattern = Math.floor((beat - startBeat) / beatStep) % 4;
        if (pattern === 0) {
          obstacles.push(createStep(x, 292, 68, 48));
          pickups.push(createPickup(x + PIXELS_PER_BEAT, pickupLaneY(difficulty, -6)));
        } else if (pattern === 1) {
          obstacles.push(createSpike(x, 38 + Math.min(10, difficulty)));
          obstacles.push(createStep(x + PIXELS_PER_BEAT, 264 - difficulty * 3, 78, 80));
          enemies.push(createScaledEnemyAtBeat(beat + 1.2, stageConfig, random, { hpBase: 4 + Math.floor(difficulty / 4) }));
        } else if (pattern === 2) {
          obstacles.push(createStep(x, 248 - difficulty * 3, 88, 96));
          obstacles.push(createStep(x + PIXELS_PER_BEAT, 292, 72, 48));
          if (difficulty >= 8) {
            obstacles.push(createStep(x + 2 * PIXELS_PER_BEAT, 228 - difficulty * 2, 90, 112));
          }
          pickups.push(createPickup(x, pickupLaneY(difficulty, -4)));
        } else {
          obstacles.push(createSpike(x + PIXELS_PER_BEAT, 40 + Math.min(8, difficulty)));
          obstacles.push(createStep(x + 2 * PIXELS_PER_BEAT, 260 - difficulty * 2, 82, 86));
          if (difficulty >= 8) {
            obstacles.push(createSpike(x + 3 * PIXELS_PER_BEAT, 34 + Math.min(12, difficulty)));
          }
          enemies.push(createScaledEnemyAtBeat(beat + 0.3, stageConfig, random, { sizeBase: 44, hpBase: 5 + Math.floor(difficulty / 4) }));
          if (beat % 8 === 0 || difficulty >= 8) {
            powerUps.push(createPowerUp(x + PIXELS_PER_BEAT, GROUND - 100));
          }
        }
      }
    }

    function buttonDown(button) {
      return !!button && (button.pressed || button.touched || button.value > 0.5);
    }

    function getActivePad() {
      if (!navigator.getGamepads) return null;
      const pads = navigator.getGamepads() || [];
      if (gamepadIndex !== null && pads[gamepadIndex] && pads[gamepadIndex].connected) return pads[gamepadIndex];
      for (const p of pads) {
        if (p && p.connected) {
          gamepadIndex = p.index;
          return p;
        }
      }
      return null;
    }


    function getShrinkAmount() {
      let amount = keys['ShiftLeft'] || keys['ShiftRight'] ? 1 : 0;
      const pad = getActivePad();
      if (pad && pad.buttons[6]) amount = Math.max(amount, pad.buttons[6].value || 0);
      return Math.max(0, Math.min(1, amount));
    }

    function registerCheat(input) {
      if (state !== STATE_RUN) return;
      cheatBuffer.push(input);
      if (cheatBuffer.length > CHEAT_CODE.length) cheatBuffer.shift();
      if (CHEAT_CODE.every((v, i) => cheatBuffer[i] === v)) {
        activateBossSkip();
        cheatBuffer = [];
      }
    }

    function registerLevelSelectCheat(input) {
      if (state !== STATE_LEVEL_SELECT) return;
      levelSelectCheatBuffer.push(input);
      if (levelSelectCheatBuffer.length > LEVEL_SELECT_UNLOCK_CODE.length) {
        levelSelectCheatBuffer.shift();
      }
      if (LEVEL_SELECT_UNLOCK_CODE.every((value, index) => levelSelectCheatBuffer[index] === value)) {
        unlockAllLevelsCheat();
      }

    function activateBossSkip() {
      worldDistance = BOSS_DISTANCE - 180;
      obstacles = [];
      enemies = [];
      pickups = [];
      powerUps = [];
      bullets = [];
      bossBullets = [];
      boss = createBoss();
      boss.entered = true;

      state = STATE_RUN;
    }

    function spawnEnemyPop(x, y) {
      const shards = [];
      for (let i = 0; i < 10; i++) {
        const angle = (-Math.PI * 0.9) + (i / 9) * Math.PI * 0.8;
        const speed = 2.8 + Math.random() * 2.6;
        shards.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - Math.random() * 1.2,
          rot: Math.random() * Math.PI * 2,
          vr: (Math.random() - 0.5) * 0.24,
          size: 7 + Math.random() * 6,
          life: 20 + Math.random() * 10
        });
      }
      enemyPopBursts.push({ x, y, ring: 0, flash: 1, life: 18, shards });
    }

    function updateEnemyPopBursts() {
      for (let i = enemyPopBursts.length - 1; i >= 0; i--) {
        const burst = enemyPopBursts[i];
        burst.life -= 1;
        burst.ring += 4.5;
        burst.flash *= 0.82;
        for (const s of burst.shards) {
          s.x += s.vx;
          s.y += s.vy;
          s.vy += 0.14;
          s.rot += s.vr;
          s.life -= 1;
        }
        burst.shards = burst.shards.filter(s => s.life > 0);
        if (burst.life <= 0 && burst.shards.length === 0) enemyPopBursts.splice(i, 1);
      }
    }

    function getAimDirection() {
      const pad = getActivePad();
      if (boss && boss.entered) {
        let ax = 1, ay = 0;
        if (pad && pad.axes && pad.axes.length >= 4) {
          ax = Math.abs(pad.axes[2]) > 0.2 ? pad.axes[2] : ax;
          ay = Math.abs(pad.axes[3]) > 0.2 ? pad.axes[3] : ay;
        } else {
          const dx = mouseAim.x - (player.x + player.size / 2);
          const dy = mouseAim.y - (player.y + player.size / 2);
          const mag = Math.hypot(dx, dy) || 1;
          ax = dx / mag; ay = dy / mag;
        }
        const mag = Math.hypot(ax, ay) || 1;
        return { x: ax / mag, y: ay / mag };
      }
      return { x: 1, y: 0 };
    }

    function togglePause() {
      if (state === STATE_RUN) {
        pauseGame();
      } else if (state === 'paused') {
        resumeGame();

    function pauseGame() {

      state = STATE_RUN;

    }

      bossCheckpointSnapshot = {
        worldDistance,

        speedupTriggered,

        enemies: clone(enemies),

        miniTutorialSeen,

        firstPowerPopupSeen,

    function restoreSnapshot(snapshot) {
      if (snapshot.currentStage && snapshot.currentStage !== currentStage) {
        applyStageConfig(snapshot.currentStage);
      }
      state = STATE_RUN;
      worldDistance = snapshot.worldDistance;
      checkpointIndex = snapshot.checkpointIndex;
      speedupTriggered = snapshot.speedupTriggered;
      Object.assign(player, clone(snapshot.player));
      obstacles = clone(snapshot.obstacles);
      enemies = clone(snapshot.enemies);
      pickups = clone(snapshot.pickups);
      powerUps = clone(snapshot.powerUps);
      bullets = clone(snapshot.bullets);
      boss = clone(snapshot.boss);

    function fixPickupOverlaps() {
      for (const p of pickups) {
        for (const o of obstacles) {
          if (o.type === 'step') {
            const overlapX = p.x + p.r > o.x && p.x - p.r < o.x + o.w;
            if (overlapX) p.y = Math.min(p.y, o.y - 18);
          }
        }
      }
    }

    function fixEnemyOverlaps() {
      for (const e of enemies) {
        for (const o of obstacles) {
          if (o.type === 'step') {
            const overlapX = e.x < o.x + o.w + 22 && e.x + e.w > o.x - 22;
            if (overlapX) e.x = o.x + o.w + 84;
          }
        }
      }
      enemies.sort((a, b) => a.x - b.x);
      for (let i = 1; i < enemies.length; i++) {
        if (enemies[i].x - enemies[i - 1].x < 180) {
          enemies[i].x = enemies[i - 1].x + 180;
        }
      }
    }


function showTutorialPopup(text, frames = 140) {
  tutorialPopup = text;
  tutorialPopupTimer = frames;
}

function updateTutorialFlow() {
  if (tutorialPopupTimer > 0) tutorialPopupTimer -= 1;

  const ammoVisible = !firstAmmoPopupSeen && pickups.some(p => p.x > W * 0.46 && p.x < W - 70);
  const powerVisible = !firstPowerPopupSeen && powerUps.some(p => p.x > W * 0.46 && p.x < W - 70);

  if (powerVisible) {
    firstPowerPopupSeen = true;
    showTutorialPopup('Collect the power-up', 150);
    return;
  }

  if (ammoVisible) {
    firstAmmoPopupSeen = true;
    showTutorialPopup('Collect ammo', 150);
    return;
  }

  if (tutorialSection === 0 && worldDistance >= 2 * PIXELS_PER_BEAT) {
    showTutorialPopup('JUMP  •  Press X / Cross', 150);
    tutorialSection = 1;
  } else if (tutorialSection === 1 && worldDistance >= 48 * PIXELS_PER_BEAT) {
    player.ammo = Math.max(player.ammo, 12);
    showTutorialPopup('NEXT SECTION  •  R2 to Shoot the red enemies', 180);
    tutorialSection = 2;
  } else if (tutorialSection === 2 && worldDistance >= 74 * PIXELS_PER_BEAT) {
    player.ammo = Math.max(player.ammo, 24);
    showTutorialPopup('NEXT SECTION  •  Hold L2 to go MINI', 190);
    tutorialSection = 3;
  } else if (tutorialSection === 3 && !miniTutorialSeen && getShrinkAmount() > 0.55) {
    miniTutorialSeen = true;
    showTutorialPopup('Good  •  Stay mini and glide through the tunnel', 190);
  } else if (tutorialSection === 3 && worldDistance >= 110 * PIXELS_PER_BEAT) {
    player.infiniteAmmo = true;
    player.ammo = 999;
    showTutorialPopup('MINI BOSS  •  Dodge missiles and shoot back', 180);
    tutorialSection = 4;
  }
}

function drawTutorialPopup() {
  if (tutorialPopupTimer <= 0 || !tutorialPopup) return;
  const alpha = Math.min(1, tutorialPopupTimer / 18, 1);
  const boxW = 720;
  const boxH = 86;
  const boxX = (W - boxW) / 2;
  const boxY = 18;
  ctx.save();
  ctx.globalAlpha = Math.min(0.96, alpha);
  ctx.fillStyle = 'rgba(6,12,22,0.72)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = 'rgba(147,197,253,0.82)';
  ctx.lineWidth = 2;
  ctx.strokeRect(boxX, boxY, boxW, boxH);
  ctx.fillStyle = '#eaf4ff';
  ctx.font = 'bold 30px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(tutorialPopup, W / 2, boxY + 55);
  ctx.textAlign = 'left';
  ctx.restore();
}

    function resetToMenu() {
      try {
        bgMusic.pause();
        bgMusic.currentTime = 0;
      } catch (err) {}
      musicStarted = false;
      preservedMusicTime = null;
      startStage(STAGE_TUTORIAL);
      state = STATE_HOME;
    }

    function beginGame() {
      if (state !== STATE_MENU) return;
      state = STATE_RUN;
      startMusic();
    }

    function startMusic() {
      const desiredSrc = getStageConfig().musicFile;
      bgMusic.loop = true;
      if (!bgMusic.src || !bgMusic.src.endsWith(desiredSrc)) {
        try {
          bgMusic.pause();
          bgMusic.src = desiredSrc;
          bgMusic.load();
          musicStarted = false;
        } catch (err) {}
      }
      if (musicStarted && !bgMusic.paused) return;
      bgMusic.play().then(() => { musicStarted = true; }).catch(() => {});
    }

    function jump() {
      if (state !== STATE_RUN) return;
      const boostActive = player.jumpBoostFrames > 0;
      if (player.grounded) {
        player.vy = boostActive ? JUMP_FORCE * JUMP_BOOST_FORCE_MULTIPLIER : JUMP_FORCE;
        player.grounded = false;
        player.jumpsUsed = 1;
        return;
      }
      if (player.jumpsUsed < 2) {
        player.vy = boostActive ? JUMP_FORCE * JUMP_BOOST_AIR_MULTIPLIER : JUMP_FORCE * 0.92;
        player.grounded = false;
        player.jumpsUsed = 2;
      }
    }

    function shoot() {
      if (state !== STATE_RUN) return;
      if (player.shootCooldown > 0) return;
      if (!player.infiniteAmmo && player.ammo <= 0) return;
      const aim = getAimDirection();
      bullets.push({
        x: player.x + player.size * 0.55 + aim.x * 18,
        y: player.y + player.size * 0.5 + aim.y * 10,
        vx: BULLET_SPEED * aim.x,
        vy: BULLET_SPEED * aim.y,
        size: 10,
        life: 90,
        color: selectedMenuColor
      });
      if (!player.infiniteAmmo) player.ammo -= 1;
      player.shootCooldown = SHOOT_COOLDOWN;
      playSfx(shootSound, 0.28);
    }

    function spawnDeathBurst(x, y, color) {
      deathBurst = { x, y, color, pulse: 0 };
      for (let i = 0; i < 20; i++) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 5,
          vy: (Math.random() - 0.5) * 5,
          size: 3 + Math.random() * 4,
          life: 18 + Math.random() * 10,
          color
        });
      }
    }

    function die(color = '#ffffff') {
      if (state !== STATE_RUN) return;
      if (currentStage === STAGE_TUTORIAL) {
        try {
          preservedMusicTime = bgMusic.currentTime;
        } catch (err) {
          preservedMusicTime = null;
        }
      } else {
        preservedMusicTime = null;
      }
      diedInBossFight = !!(boss && boss.entered && currentStage !== STAGE_TUTORIAL);
      state = STATE_DEAD;
      deathTimer = DEATH_FRAMES;
      spawnDeathBurst(player.x + player.size / 2, player.y + player.size / 2, color);
    }

  const jumpPressed = buttonDown(pad.buttons[0]);      // Cross / X

  const shrinkPressed = pad.buttons[6]?.value > 0.05;  // L2
  const menuPressed = buttonDown(pad.buttons[9]);      // Options
  const upPressed = buttonDown(pad.buttons[12]) || (pad.axes?.[1] ?? 0) < -0.5;
  const downPressed = buttonDown(pad.buttons[13]) || (pad.axes?.[1] ?? 0) > 0.5;
  const leftPressed = buttonDown(pad.buttons[14]) || (pad.axes?.[0] ?? 0) < -0.5;
  const rightPressed = buttonDown(pad.buttons[15]) || (pad.axes?.[0] ?? 0) > 0.5;
  const anyPressed = pad.buttons.some(buttonDown);

  if (circlePressed && !lastPadShoot) registerCheat('circle');
  if (jumpPressed && !lastPadJump) registerCheat('square');

  if (state === STATE_HOME) {
    if (upPressed && !lastPadJump) homeSelectedIndex = 0;
    if (downPressed && !lastPadShoot && homeSelectedIndex === 0) homeSelectedIndex = 1;
    if (leftPressed && !lastPadMenu && homeSelectedIndex !== 0) homeSelectedIndex = 1;
    if (rightPressed && !lastPadAny && homeSelectedIndex !== 0) homeSelectedIndex = 2;

    if (jumpPressed && !lastPadJump) {
      if (homeSelectedIndex === 0) openTutorialMenu(STAGE_TUTORIAL);
      else if (homeSelectedIndex === 1) openColorMenu();
      else openLevelSelectMenu();
    }
    lastPadMenu = menuPressed || leftPressed;
    lastPadJump = jumpPressed || upPressed;
    lastPadShoot = shootPressed || downPressed || circlePressed;
    lastPadAny = anyPressed || rightPressed;
    return;
  }

  if (state === STATE_COLOR_MENU) {
    if (menuPressed && !lastPadMenu) { closeColorMenu(); }
    if (circlePressed && !lastPadShoot) { closeColorMenu(); }
    if (upPressed && !lastPadJump) colorSelectedIndex = Math.max(0, colorSelectedIndex - 3);
    if (downPressed && !lastPadShoot) colorSelectedIndex = Math.min(MENU_COLOR_OPTIONS.length - 1, colorSelectedIndex + 3);
    if (leftPressed && !lastPadMenu) colorSelectedIndex = Math.max(0, colorSelectedIndex - 1);
    if (rightPressed && !lastPadAny) colorSelectedIndex = Math.min(MENU_COLOR_OPTIONS.length - 1, colorSelectedIndex + 1);
    if (jumpPressed && !lastPadJump) {
      const chosen = MENU_COLOR_OPTIONS[colorSelectedIndex];
      if (unlockedColors.has(chosen)) {
        setSelectedMenuColor(chosen);
      }
      triggerMenuPreviewJump();
    }
    if (squarePressed && !lastPadAny) triggerMenuPreviewJump();
    lastPadMenu = menuPressed || leftPressed;
    lastPadJump = jumpPressed || upPressed;
    lastPadShoot = shootPressed || downPressed || circlePressed;
    lastPadAny = anyPressed || rightPressed || squarePressed;
    return;
  }

  if (state === STATE_LEVEL_SELECT) {
    const maxStart = Math.max(0, LEVEL_SELECT_ITEMS.length - 4);
    if (trianglePressed && !lastPadTriangle) registerLevelSelectCheat('triangle');
    if (squarePressed && !lastPadSquare) registerLevelSelectCheat('square');
    if (menuPressed && !lastPadMenu) { openHomeMenu(); }
    if (circlePressed && !lastPadShoot) { openHomeMenu(); }

    if (upPressed && !lastPadJump) {
      if (levelSelectedIndex > 0) levelSelectedIndex -= 1;
      else if (levelScrollIndex > 0) levelScrollIndex -= 1;
    }
    if (downPressed && !lastPadShoot) {
      const visibleCount = getVisibleLevelItems().length;
      if (levelSelectedIndex < visibleCount - 1) levelSelectedIndex += 1;
      else if (levelScrollIndex < maxStart) levelScrollIndex += 1;
    }

    if (jumpPressed && !lastPadJump) {
      const items = getVisibleLevelItems();
      const item = items[levelSelectedIndex];
      if (item && !item.locked && item.stage) openTutorialMenu(item.stage);
    }

    lastPadMenu = menuPressed;
    lastPadJump = jumpPressed || upPressed;
    lastPadShoot = shootPressed || downPressed || circlePressed;
    lastPadAny = anyPressed || leftPressed || rightPressed;
    lastPadTriangle = trianglePressed;
    lastPadSquare = squarePressed;
    return;
  }

  if (state === STATE_MENU) {
    if ((jumpPressed || menuPressed || anyPressed) && !lastPadAny) beginGame();
    if (circlePressed && !lastPadShoot) openHomeMenu();
    lastPadMenu = menuPressed;
    lastPadJump = jumpPressed;
    lastPadShoot = shootPressed || circlePressed;
    lastPadAny = anyPressed;
    return;
  }

  if (state === STATE_WIN) {
    if ((jumpPressed || menuPressed || anyPressed) && !lastPadAny) { continueFromWin(); }
    lastPadMenu = menuPressed;
    lastPadJump = jumpPressed;
    lastPadShoot = shootPressed || circlePressed;
    lastPadAny = anyPressed;
    return;
  }

  if (menuPressed && !lastPadMenu) {
    togglePause();
    lastPadMenu = menuPressed;
    lastPadJump = jumpPressed;
    lastPadShoot = shootPressed || circlePressed;
    lastPadAny = anyPressed;
    return;
  }

  if (state === 'paused') {
    if ((upPressed || downPressed) && !lastPadJump) pauseSelection = (pauseSelection + 1) % 2;
    if (jumpPressed && !lastPadJump) {
      if (pauseSelection === 0) resumeGame();
      else if (pauseSelection === 1) resetToMenu();
    }
    if (circlePressed && !lastPadShoot) resumeGame();
    lastPadMenu = menuPressed;
    lastPadJump = jumpPressed || upPressed || downPressed;
    lastPadShoot = shootPressed || circlePressed;
    lastPadAny = anyPressed;
    return;
  }

  if (state !== STATE_RUN) {
    lastPadJump = jumpPressed;
    lastPadShoot = shootPressed || circlePressed;
    lastPadMenu = menuPressed;
    lastPadAny = anyPressed;
    return;
  }

  if (jumpPressed && !lastPadJump) jump();
  if (shootPressed) shoot();

  lastPadJump = jumpPressed;
  lastPadShoot = shootPressed || shrinkPressed || circlePressed;
  lastPadMenu = menuPressed;
  lastPadAny = anyPressed;
}

    function updateRun() {
      let speed = currentSpeed();
      if (keys['KeyX']) shoot();

      // 🔥 FREEZE TRACK DURING BOSS FIGHT
      if (boss && boss.entered) {
        speed = 0;
      }

      frame += 1;
      worldDistance += speed;

      if (!speedupTriggered && worldDistance >= SPEEDUP_DISTANCE) {
        speedupTriggered = true;
      }

      if (!player.infiniteAmmo && worldDistance >= BOSS_DISTANCE - PIXELS_PER_BEAT * 6) {
        player.infiniteAmmo = true;
        player.ammo = 999;
      }

      if (!boss && worldDistance >= BOSS_DISTANCE) {
        if (currentStage !== STAGE_TUTORIAL && !bossCheckpointSnapshot) saveBossCheckpoint();
        boss = createBoss();
        bossJustDefeated = false;
      }

      if (player.shootCooldown > 0) player.shootCooldown -= 1;
      if (player.invincible > 0) player.invincible -= 1;
      const jumpBoostActive = player.jumpBoostFrames > 0;
      if (player.jumpBoostFrames > 0) player.jumpBoostFrames -= 1;

      const shrink = getShrinkAmount();
      player.targetSize = player.baseSize - (player.baseSize - player.minSize) * shrink;
      const prevBottom = player.y + player.size;
      player.size += (player.targetSize - player.size) * 0.22;
      player.y = prevBottom - player.size;

      const prevY = player.y;
      player.vy += GRAVITY * (jumpBoostActive ? JUMP_BOOST_GRAVITY_MULTIPLIER : 1);
      player.y += player.vy;
      player.grounded = false;

      for (const o of obstacles) o.x -= speed;
      for (const e of enemies) e.x -= speed;
      for (const p of pickups) p.x -= speed;
      for (const p of powerUps) {
        p.x -= speed;
        p.pulse += 0.08;
      }

      if (boss) updateBoss(speed);
      updateBossBullets(speed);
      updateEnemyBullets();
      updateEnemyShooting();

      if (player.y >= GROUND - player.size) {
        player.y = GROUND - player.size;
        player.vy = 0;
        player.grounded = true;
        player.jumpsUsed = 0;
      }

      resolvePlatforms(prevY);

      if (!player.grounded) {
        player.rotation += 0.16;
      } else {
        player.rotation = Math.round(player.rotation / (Math.PI / 2)) * (Math.PI / 2);
      }

      const nextCheckpoint = CHECKPOINTS[checkpointIndex + 1];
      if (nextCheckpoint !== undefined && worldDistance >= nextCheckpoint) {
        checkpointIndex += 1;
        saveCheckpoint();
      }

      if (currentStage === STAGE_TUTORIAL) updateTutorialFlow();
      updateBullets();
      updateEnemyPopBursts();
      collectPickups();
      handleCollisions();

      if (state === STATE_RUN && worldDistance >= LEVEL_DISTANCE) {
        setWinState();
      }

      obstacles = obstacles.filter(o => o.x + o.w > -120);
      for (const e of enemies) {
        if (e.shake > 0) e.shake--;
        e.offsetY += e.vy || 0;
        e.vy = (e.vy || 0) + 0.6;
        if (e.offsetY > 0) { e.offsetY = 0; e.vy = 0; }
      }
      enemies = enemies.filter(e => e.x + e.w > -120);
      pickups = pickups.filter(p => p.x + p.r > -40);
      powerUps = powerUps.filter(p => p.x + p.r > -40);
    }

    function updateBoss(speed) {
      if (!boss || !boss.active) return;
      boss.pulse += 0.08;
      if (!boss.entered) {
        boss.x -= speed * 1.1;
        if (boss.x <= W - 260) {
          boss.entered = true;
          bossShield = getStageConfig().bossShieldCount || 2;
        }
      } else {
        boss.y = 220 + Math.sin(frame * 0.03) * 40;
        if (boss.hp <= boss.maxHp / 2) boss.phase = 2;
        boss.fireCooldown -= 1;
        if (boss.fireCooldown <= 0) {
          const px = player.x + player.size / 2;
          const py = player.y + player.size / 2;
          const sx = boss.x + boss.w * 0.25;
          const sy = boss.y - boss.h * 0.55;
          const dx = px - sx;
          const dy = py - sy;
          const mag = Math.hypot(dx, dy) || 1;
          const spread = (Math.random() - 0.5) * 0.25;
          const cs = Math.cos(spread), sn = Math.sin(spread);
          const ndx = (dx / mag) * cs - (dy / mag) * sn;
          const ndy = (dx / mag) * sn + (dy / mag) * cs;
          const cfg = getStageConfig();
          const speedB = boss.phase === 2 ? cfg.bossBulletSpeed2 : cfg.bossBulletSpeed1;
          bossBullets.push({
            x: sx, y: sy, w: boss.phase === 2 ? 24 : 20, h: boss.phase === 2 ? 24 : 20,
            vx: ndx * speedB, vy: ndy * speedB
          });
          const fireBase = boss.phase === 2 ? cfg.bossFire2[0] : cfg.bossFire1[0];
          const fireRand = boss.phase === 2 ? cfg.bossFire2[1] : cfg.bossFire1[1];
          boss.fireCooldown = fireBase + Math.floor(Math.random() * fireRand);
        }
      }
      if (boss.hp <= 0) {
        boss.hp = 0;
        bossBullets = [];
        bossJustDefeated = true;
        bossDefeatSequence = {
          timer: 0,
          exploded: false,
          explosionTimer: 0,
          explosionX: boss.x + boss.w / 2,
          explosionY: boss.y - boss.h / 2,
          flash: 0
        };
        state = STATE_BOSS_DEFEAT;
      }
    }

    function updateBossBullets() {
      for (const b of bossBullets) {
        b.x += b.vx;
        b.y += b.vy;
      }
      bossBullets = bossBullets.filter(b => b.x + b.w > -60 && b.x < W + 60 && b.y > -60 && b.y < H + 60);
    }

    function updateEnemyShooting() {
      // Only the boss shoots now.
      return;
    }

    function updateEnemyBullets() {
      for (const b of enemyBullets) {
        b.x += b.vx;
        b.y += b.vy;
        b.life -= 1;
      }
      enemyBullets = enemyBullets.filter(b => b.life > 0 && b.x > -40 && b.x < W + 40 && b.y > -40 && b.y < H + 40);
    }

    function resolvePlatforms(prevY) {
      if (boss && boss.entered) return;
      const bottom = player.y + player.size;
      for (const o of obstacles) {
        if (o.type !== 'step') continue;
        const onX = player.x + player.size > o.x && player.x < o.x + o.w;
        const wasAbove = prevY + player.size <= o.y + 2;
        if (onX && wasAbove && bottom >= o.y && bottom <= o.y + o.h + 18 && player.vy >= 0) {
          player.y = o.y - player.size;
          player.vy = 0;
          player.grounded = true;
          player.jumpsUsed = 0;
        }
      }
    }

    function collectPickups() {
      for (let i = pickups.length - 1; i >= 0; i--) {
        const p = pickups[i];
        if (circleRectOverlap(p.x, p.y, p.r, player.x, player.y, player.size, player.size)) {
          player.ammo += 10;
          pickups.splice(i, 1);
        }
      }

      for (let i = powerUps.length - 1; i >= 0; i--) {
        const p = powerUps[i];
        if (circleRectOverlap(p.x, p.y, p.r, player.x, player.y, player.size, player.size)) {
          if (p.kind === 'jump') {
            const boostFrames = Math.round(JUMP_BOOST_BEATS * 3600 / Math.max(1, currentBpm));
            player.jumpBoostFrames = Math.max(player.jumpBoostFrames, boostFrames);
          } else {
            player.invincible = Math.max(player.invincible, INVINCIBLE_FRAMES);
          }
          powerUps.splice(i, 1);
        }
      }
    }

    function updateBullets() {
      for (const b of bullets) {
        b.x += b.vx;
        b.y += b.vy || 0;
        b.life -= 1;
      }
      bullets = bullets.filter(b => b.life > 0 && b.x > -60 && b.x < W + 60 && b.y > -60 && b.y < H + 60);

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        let hit = false;

        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (circleRectOverlap(b.x, b.y, b.size / 2, e.x, e.y - e.h + (e.offsetY||0), e.w, e.h)) {
            e.hp -= 1;
            e.shake = 10;
            e.vy = -3.5;
            if (e.hp <= 0) {
              spawnEnemyPop(e.x + e.w / 2, e.y - e.h * 0.45);
              enemies.splice(j, 1);
            }
            hit = true;
            break;
          }
        }

        if (!hit && boss && boss.active && circleRectOverlap(b.x, b.y, b.size / 2, boss.x, boss.y - boss.h, boss.w, boss.h)) {
          boss.hp -= 1;
          hit = true;
        }

        if (hit) bullets.splice(i, 1);
      }
    }

    function handleCollisions() {
      if (player.invincible > 0) return;
      const inBossArena = boss && boss.entered;

      if (!inBossArena) {
        for (const o of obstacles) {
          if (o.type === 'step' && o.h <= 40 && o.w >= 100 && player.size > 48) {
            const tunnelHit = circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.34, o.x, o.y, o.w, o.h);
            if (tunnelHit) {
              die('#60a5fa');
              return;
            }
          }
          if (o.type === 'spike' && circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.38, o.x, o.y - o.h, o.w, o.h)) {
            die('#f97316');
            return;
          }
          if (o.type === 'step') {
            const touching = circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.4, o.x, o.y, o.w, o.h);
            const landed = player.grounded && Math.abs(player.y + player.size - o.y) < 4;
            if (touching && !landed) {
              die('#a855f7');
              return;
            }
          }
        }

        const comfortBuffer = speedupTriggered && worldDistance < SPEEDUP_DISTANCE + PIXELS_PER_BEAT * 6;
        if (!comfortBuffer) {
          for (const e of enemies) {
            if (circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.38, e.x, e.y - e.h, e.w, e.h)) {
              die('#ef4444');
              return;
            }
          }
        }
      }

      for (let i = bossBullets.length - 1; i >= 0; i--) {
        const b = bossBullets[i];
        if (circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.38, b.x - b.w / 2, b.y - b.h / 2, b.w, b.h)) {
          if (bossShield > 0) {
            bossShield -= 1;
            bossBullets.splice(i, 1);
            player.invincible = 45;
            continue;
          }
          die('#f43f5e');
          return;
        }
      }

      for (const b of enemyBullets) {
        if (circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.38, b.x, b.y, b.size, b.size)) {
          die('#f59e0b');
          return;
        }
      }

      if (boss && boss.active && circleRectOverlap(player.x + player.size / 2, player.y + player.size / 2, player.size * 0.38, boss.x, boss.y - boss.h, boss.w, boss.h)) {
        if (bossShield > 0) {
          bossShield -= 1;
          player.invincible = 45;
          return;
        }
        die('#8b5cf6');
      }
    }

    function updateDead() {
      deathTimer -= 1;
      if (deathBurst) deathBurst.pulse += 1;
      updateParticles();
      if (deathTimer <= 0) restoreCheckpoint();
    }

    function updateBossDefeat() {
      if (!bossDefeatSequence || !boss) return;
      bossDefeatSequence.timer += cinematicTimeScale;

      if (bossDefeatSequence.timer < 90) {
        cinematicTimeScale = 0.72;
        boss.y = 220 + Math.sin(frame * 0.18) * 8;
      } else if (bossDefeatSequence.timer < 135) {
        cinematicTimeScale = 0.88;
        boss.y = 220 + Math.sin(frame * 0.12) * 4;
        boss.pulse += 0.22;
      } else {
        if (!bossDefeatSequence.exploded) {
          bossDefeatSequence.exploded = true;
          bossDefeatSequence.flash = 1;
          cinematicTimeScale = 1;
          const cx = boss.x + boss.w / 2;
          const cy = boss.y - boss.h / 2;
          for (let i = 0; i < 90; i++) {
            const angle = (Math.PI * 2 * i) / 90 + Math.random() * 0.25;
            const speed = 2 + Math.random() * 8;
            particles.push({
              x: cx,
              y: cy,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              size: 6 + Math.random() * 10,
              life: 35 + Math.random() * 35,
              color: i % 3 === 0 ? '#fff1a8' : (i % 3 === 1 ? '#ff7a59' : '#ef4444')
            });
          }
        }
        bossDefeatSequence.explosionTimer += cinematicTimeScale;
        bossDefeatSequence.flash *= 0.94;
      }

      if (bossDefeatSequence.timer >= 255) {
        cinematicTimeScale = 1;
        boss = null;
        bossDefeatSequence = null;
        setWinState();
      }
    }

    function updateParticles() {
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;
      }
      particles = particles.filter(p => p.life > 0);
    }

    function update() {
      updateGamepad();
      if (menuPreviewJump > 0) menuPreviewJump -= 1;
      if (state === 'paused') return;
      if (state === STATE_RUN) {
        updateRun();
        updateParticles();
      } else if (state === STATE_DEAD) {
        updateDead();
      } else if (state === STATE_BOSS_DEFEAT) {
        frame += 1;
        updateBossDefeat();
        updateParticles();
      }
    }

    function circleRectOverlap(cx, cy, cr, rx, ry, rw, rh) {
      const px = Math.max(rx, Math.min(cx, rx + rw));
      const py = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - px;
      const dy = cy - py;
      return dx * dx + dy * dy <= cr * cr;
    }


    function getSecondsLeft() {
      const remaining = Math.max(0, LEVEL_DISTANCE - worldDistance);
      const seconds = remaining / Math.max(1, currentBaseSpeed * 60);
      return Math.max(0, Math.ceil(seconds));
    }

    function drawBackground() {
      if (!window.bgImg) {
        refreshBackground();
      }

      if (window.bgLoaded) {
        const img = window.bgImg;
        const scale = Math.max(W / img.width, H / img.height);
        const drawW = img.width * scale;
        const drawH = img.height * scale;
        const y = (H - drawH) / 2;

        const scroll = (worldDistance * 0.18) % drawW;
        const pulse = 0.08 + Math.sin(frame * 0.018) * 0.04;

        ctx.imageSmoothingEnabled = true;
        ctx.fillStyle = '#08111f';
        ctx.fillRect(0, 0, W, H);

        ctx.drawImage(img, -scroll, y, drawW, drawH);
        ctx.drawImage(img, drawW - scroll, y, drawW, drawH);

        ctx.save();
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0.03, pulse)})`;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();

        const vignette = ctx.createLinearGradient(0, 0, 0, H);
        vignette.addColorStop(0, 'rgba(4,10,22,0.12)');
        vignette.addColorStop(0.55, 'rgba(6,12,24,0.01)');
        vignette.addColorStop(1, 'rgba(3,8,18,0.20)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, W, H);
      } else {
        const fallback = ctx.createLinearGradient(0, 0, 0, H);
        fallback.addColorStop(0, '#112246');
        fallback.addColorStop(1, '#08111f');
        ctx.fillStyle = fallback;
        ctx.fillRect(0, 0, W, H);
      }
    }


    function drawHomeBackground() {
      if (menuBgLoaded) {
        const img = menuBgImg;
        const scale = Math.max(W / img.width, H / img.height);
        const drawW = img.width * scale;
        const drawH = img.height * scale;
        const x = (W - drawW) / 2;
        const y = (H - drawH) / 2;
        ctx.fillStyle = '#08111f';
        ctx.fillRect(0, 0, W, H);
        ctx.drawImage(img, x, y, drawW, drawH);
        const vignette = ctx.createLinearGradient(0, 0, 0, H);
        vignette.addColorStop(0, 'rgba(4,10,22,0.10)');
        vignette.addColorStop(0.55, 'rgba(6,12,24,0.02)');
        vignette.addColorStop(1, 'rgba(3,8,18,0.24)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, W, H);
      } else {
        const fallback = ctx.createLinearGradient(0, 0, 0, H);
        fallback.addColorStop(0, '#112246');
        fallback.addColorStop(1, '#08111f');
        ctx.fillStyle = fallback;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawMenuPreviewSprite(x, y, size) {
      const jumpOffset = menuPreviewJump > 0 ? Math.sin((18 - menuPreviewJump) / 18 * Math.PI) * -18 : 0;
      if (playerSpriteLoaded) {
        ctx.save();
        ctx.drawImage(playerImg, x, y + jumpOffset, size, size);
        ctx.restore();
      } else {
        ctx.save();
        ctx.translate(x + size / 2, y + size / 2 + jumpOffset);
        const radius = size * 0.38;
        ctx.shadowColor = selectedMenuColor;
        ctx.shadowBlur = 22;
        ctx.strokeStyle = selectedMenuColor;
        ctx.lineWidth = Math.max(4, size * 0.085);
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 0.28;
        ctx.fillStyle = selectedMenuColor;
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.72, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
