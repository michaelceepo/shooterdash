    function drawBoss() {
      if (!boss) return;
      const defeat = bossDefeatSequence;
      if (defeat && defeat.exploded && defeat.explosionTimer > 40) return;
      let pulse = 1 + Math.sin(boss.pulse) * 0.04;
      let shakeX = 0;
      let shakeY = 0;
      if (defeat) {
        if (defeat.timer < 90) {
          shakeX = (Math.random() - 0.5) * 16;
          shakeY = (Math.random() - 0.5) * 10;
        } else if (defeat.timer < 135) {
          shakeX = (Math.random() - 0.5) * 8;
          shakeY = (Math.random() - 0.5) * 6;
          pulse = 1.08 + Math.sin(defeat.timer * 0.35) * 0.08;
        }
      }
      ctx.save();
      ctx.translate(boss.x + boss.w / 2 + shakeX, boss.y - boss.h / 2 + shakeY);
      ctx.scale(pulse, pulse);

      // different shape, same red material language
      const w = boss.w, h = boss.h;
      const grad = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
      grad.addColorStop(0, '#ff8a8a');
      grad.addColorStop(0.35, '#ff4d4d');
      grad.addColorStop(1, '#3b0a0a');
      ctx.shadowColor = 'rgba(255, 70, 70, 0.65)';
      ctx.shadowBlur = 24;

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(-w * 0.50, h * 0.18);
      ctx.lineTo(-w * 0.30, -h * 0.38);
      ctx.lineTo(0, -h * 0.50);
      ctx.lineTo(w * 0.30, -h * 0.38);
      ctx.lineTo(w * 0.50, h * 0.18);
      ctx.lineTo(w * 0.18, h * 0.50);
      ctx.lineTo(-w * 0.18, h * 0.50);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(30,0,0,0.35)';
      ctx.beginPath();
      ctx.moveTo(-w * 0.44, h * 0.15);
      ctx.lineTo(-w * 0.18, -h * 0.28);
      ctx.lineTo(-w * 0.06, h * 0.46);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(w * 0.44, h * 0.15);
      ctx.lineTo(w * 0.18, -h * 0.28);
      ctx.lineTo(w * 0.06, h * 0.46);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = 'rgba(255,230,230,0.92)';
      ctx.beginPath();
      ctx.moveTo(-w * 0.14, h * 0.32);
      ctx.lineTo(0, -h * 0.26);
      ctx.lineTo(w * 0.14, h * 0.32);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.98)';
      ctx.fillRect(-2, -h * 0.22, 4, h * 0.40);

      ctx.strokeStyle = 'rgba(255,205,205,0.95)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-w * 0.50, h * 0.18);
      ctx.lineTo(-w * 0.30, -h * 0.38);
      ctx.lineTo(0, -h * 0.50);
      ctx.lineTo(w * 0.30, -h * 0.38);
      ctx.lineTo(w * 0.50, h * 0.18);
      ctx.lineTo(w * 0.18, h * 0.50);
      ctx.lineTo(-w * 0.18, h * 0.50);
      ctx.closePath();
      ctx.stroke();

      if (defeat && defeat.timer >= 90 && defeat.timer < 135) {
        ctx.fillStyle = 'rgba(255, 245, 180, 0.28)';
        ctx.shadowColor = 'rgba(255, 245, 180, 0.95)';
        ctx.shadowBlur = 36 + Math.sin(defeat.timer * 0.4) * 8;
        ctx.beginPath();
        ctx.moveTo(-w * 0.50, h * 0.18);
        ctx.lineTo(-w * 0.30, -h * 0.38);
        ctx.lineTo(0, -h * 0.50);
        ctx.lineTo(w * 0.30, -h * 0.38);
        ctx.lineTo(w * 0.50, h * 0.18);
        ctx.lineTo(w * 0.18, h * 0.50);
        ctx.lineTo(-w * 0.18, h * 0.50);
        ctx.closePath();
        ctx.fill();
      }

      ctx.restore();

      if (defeat && defeat.exploded) {
        const r = 40 + defeat.explosionTimer * 6;
        const alpha = Math.max(0, 1 - defeat.explosionTimer / 45);
        const cx = defeat.explosionX;
        const cy = defeat.explosionY;
        ctx.save();
        ctx.globalAlpha = alpha;
        const burst = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        burst.addColorStop(0, 'rgba(255,255,255,0.98)');
        burst.addColorStop(0.2, 'rgba(255,230,140,0.95)');
        burst.addColorStop(0.55, 'rgba(255,110,70,0.78)');
        burst.addColorStop(1, 'rgba(255,80,80,0)');
        ctx.fillStyle = burst;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      if (!defeat) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(260, 20, 480, 24);
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(260, 20, 480 * Math.max(0, boss.hp / boss.maxHp), 24);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.strokeRect(260, 20, 480, 24);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px Arial';
        ctx.fillText('BOSS', 470, 37);
      }
    }

    function drawBossBullets() {
      for (const b of bossBullets) {
        const angle = Math.atan2(b.vy, b.vx);
        const bodyW = b.w * 1.25;
        const bodyH = b.h * 0.52;
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(angle);
        ctx.shadowColor = 'rgba(251, 113, 133, 0.95)';
        ctx.shadowBlur = 18;

        ctx.fillStyle = '#fb7185';
        ctx.beginPath();
        ctx.moveTo(bodyW * 0.58, 0);
        ctx.lineTo(bodyW * 0.18, -bodyH * 0.95);
        ctx.lineTo(-bodyW * 0.45, -bodyH * 0.95);
        ctx.lineTo(-bodyW * 0.62, 0);
        ctx.lineTo(-bodyW * 0.45, bodyH * 0.95);
        ctx.lineTo(bodyW * 0.18, bodyH * 0.95);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#fca5a5';
        ctx.fillRect(-bodyW * 0.18, -bodyH * 0.28, bodyW * 0.34, bodyH * 0.56);

        ctx.fillStyle = '#fde68a';
        ctx.beginPath();
        ctx.moveTo(-bodyW * 0.62, 0);
        ctx.lineTo(-bodyW * 1.02, -bodyH * 0.48);
        ctx.lineTo(-bodyW * 0.9, 0);
        ctx.lineTo(-bodyW * 1.02, bodyH * 0.48);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#7f1d1d';
        ctx.fillRect(-bodyW * 0.42, -bodyH * 0.9, bodyW * 0.14, bodyH * 0.42);
        ctx.fillRect(-bodyW * 0.42, bodyH * 0.48, bodyW * 0.14, bodyH * 0.42);

        ctx.restore();
      }
    }

    function drawBullets() {
      for (const b of bullets) {
        ctx.save();
        ctx.shadowColor = b.color || selectedMenuColor;
        ctx.shadowBlur = 16;
        ctx.fillStyle = b.color || selectedMenuColor;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x + player.size / 2, player.y + player.size / 2);
      ctx.rotate(player.rotation);
      const radius = player.size * 0.38;
      ctx.shadowColor = player.invincible > 0 ? 'rgba(56,189,248,0.95)' : selectedMenuColor;
      ctx.shadowBlur = player.invincible > 0 ? 30 : 26;
      ctx.strokeStyle = player.invincible > 0 ? '#38bdf8' : selectedMenuColor;
      ctx.lineWidth = Math.max(4, player.size * 0.085);
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = player.invincible > 0 ? 'rgba(56,189,248,0.32)' : selectedMenuColor;
      ctx.beginPath();
      ctx.arc(0, 0, radius * 0.72, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(220,255,240,0.95)';
      ctx.lineWidth = Math.max(1.5, player.size * 0.028);
      ctx.beginPath();
      ctx.arc(0, 0, radius * 0.74, -0.8, 0.4);
      ctx.stroke();
      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      }
      for (const burst of enemyPopBursts) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, burst.flash * 0.55);
        ctx.strokeStyle = 'rgba(255,255,255,0.95)';
        ctx.lineWidth = 4;
        ctx.shadowColor = 'rgba(255,110,110,0.65)';
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(burst.x, burst.y, burst.ring, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
        for (const s of burst.shards) {
          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.rotate(s.rot);
          ctx.globalAlpha = Math.max(0, s.life / 28);
          ctx.shadowColor = 'rgba(255,90,90,0.55)';
          ctx.shadowBlur = 10;
          const shardGrad = ctx.createLinearGradient(-s.size * 0.5, 0, s.size * 0.5, 0);
          shardGrad.addColorStop(0, '#ffb3b3');
          shardGrad.addColorStop(0.45, '#ff4d4d');
          shardGrad.addColorStop(1, '#6b1111');
          ctx.fillStyle = shardGrad;
          ctx.beginPath();
          ctx.moveTo(-s.size * 0.52, s.size * 0.26);
          ctx.lineTo(0, -s.size * 0.52);
          ctx.lineTo(s.size * 0.52, s.size * 0.26);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }
      if (deathBurst) {
        const alpha = Math.max(0, deathTimer / DEATH_FRAMES);
        const radius = 20 + deathBurst.pulse * 4;
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.strokeStyle = deathBurst.color;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(deathBurst.x, deathBurst.y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawHUD() {
      ctx.fillStyle = '#f8fafc';
      ctx.font = 'bold 18px Arial';
      ctx.fillText(`Ammo: ${player.infiniteAmmo ? 'INF' : player.ammo}`, 30, 42);
      ctx.fillText(`Checkpoint: ${checkpointIndex + 1}/${CHECKPOINTS.length}`, 30, 72);
      if (boss && boss.entered) ctx.fillText(`Boss Shields: ${Math.max(0, bossShield)}`, 30, 102);
      else if (player.invincible > 0) ctx.fillText(`Invincible: ${Math.ceil(player.invincible / 60)}s`, 30, 102);
      if (player.jumpBoostFrames > 0) ctx.fillText(`Jump Boost: ${Math.ceil(player.jumpBoostFrames / 60)}s`, 30, 132);


      const barX = 130, barY = H - 24, barW = W - 260, barH = 10;
      const progress = Math.max(0, Math.min(1, worldDistance / LEVEL_DISTANCE));
      ctx.fillStyle = 'rgba(15, 23, 42, 0.25)';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.strokeStyle = 'rgba(255,255,255,0.14)';
      ctx.lineWidth = 2;
      ctx.strokeRect(barX, barY, barW, barH);
      ctx.fillStyle = '#22d3ee';
      ctx.fillRect(barX, barY, barW * progress, barH);
      for (let i = 0; i < CHECKPOINTS.length; i++) {
        const cpProgress = CHECKPOINTS[i] / LEVEL_DISTANCE;
        const markerX = barX + barW * cpProgress;
        ctx.fillStyle = i <= checkpointIndex ? '#86efac' : 'rgba(255,255,255,0.4)';
        ctx.fillRect(markerX - 2, H - 28, 4, 18);
      }

      if (boss && boss.entered) {
        const aim = getAimDirection();
        const px = player.x + player.size / 2;
        const py = player.y + player.size / 2;
        ctx.save();
        ctx.strokeStyle = selectedMenuColor;
        ctx.globalAlpha = 0.35;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + aim.x * 100, py + aim.y * 100);
        ctx.stroke();
        ctx.restore();
      }

      ctx.fillStyle = '#e2e8f0';
      ctx.font = 'bold 14px Arial';
      ctx.fillText(getStageConfig().progressLabel, 30, H - 16);
      ctx.textAlign = 'right';
      ctx.fillText(`${getSecondsLeft()}s left`, W - 30, H - 16);
      ctx.textAlign = 'left';
    }

    function drawMenu() {
      const panelW = 500;
      const panelH = 188;
      const panelX = (W - panelW) / 2;
      const panelY = 102;

      const topGlow = ctx.createLinearGradient(0, panelY, 0, panelY + panelH);
      topGlow.addColorStop(0, 'rgba(8,17,31,0.56)');
      topGlow.addColorStop(1, 'rgba(8,17,31,0.84)');
      ctx.fillStyle = topGlow;
      ctx.fillRect(panelX, panelY, panelW, panelH);

      ctx.strokeStyle = 'rgba(147,197,253,0.75)';
      ctx.lineWidth = 2;
      ctx.strokeRect(panelX, panelY, panelW, panelH);

      ctx.fillStyle = 'rgba(96,165,250,0.10)';
      ctx.fillRect(panelX + 16, panelY + 16, panelW - 32, 40);

      ctx.textAlign = 'center';
      ctx.fillStyle = '#eaf4ff';
      ctx.font = 'bold 18px Arial';
      ctx.fillText(getStageConfig().label, W / 2, panelY + 42);

      ctx.font = 'bold 44px Arial';
      ctx.fillText(getStageConfig().menuTitle, W / 2, panelY + 92);

      ctx.fillStyle = '#bfdcff';
      ctx.font = '18px Arial';
      ctx.fillText(getStageConfig().menuSub, W / 2, panelY + 122);

      const btnX = W / 2 - 96;
      const btnY = panelY + 138;
      const btnW = 192;
      const btnH = 34;

      const btnGrad = ctx.createLinearGradient(0, btnY, 0, btnY + btnH);
      btnGrad.addColorStop(0, '#2fe27d');
      btnGrad.addColorStop(1, '#1fb75f');
      ctx.fillStyle = btnGrad;
      ctx.fillRect(btnX, btnY, btnW, btnH);

      ctx.strokeStyle = '#d8ffe6';
      ctx.lineWidth = 2;
      ctx.strokeRect(btnX, btnY, btnW, btnH);

      ctx.fillStyle = '#062714';
      ctx.font = 'bold 22px Arial';
      ctx.fillText('PLAY', W / 2, btnY + 24);

      ctx.fillStyle = '#93c5fd';
      ctx.font = '14px Arial';
      ctx.fillText('Space / Click / Controller A', W / 2, panelY + 186);

      ctx.textAlign = 'left';
    }


    function drawPauseMenu() {
  ctx.fillStyle = 'rgba(8, 17, 31, 0.78)';
  ctx.fillRect(240, 110, 520, 180);
  ctx.strokeStyle = '#60a5fa';
  ctx.lineWidth = 3;
  ctx.strokeRect(240, 110, 520, 180);
  ctx.fillStyle = '#f8fafc';
  ctx.font = 'bold 40px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W / 2, 160);
  const labels = ['PLAY', 'RESTART'];
  pauseButtons = [];
  for (let i = 0; i < labels.length; i++) {
    const bx = W / 2 - 120;
    const by = 190 + i * 52;
    const bw = 240, bh = 40;
    pauseButtons.push({ x: bx, y: by, w: bw, h: bh, i });
    ctx.fillStyle = i === pauseSelection ? '#22c55e' : 'rgba(15,23,42,0.92)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = i === pauseSelection ? '#bbf7d0' : '#93c5fd';
    ctx.strokeRect(bx, by, bw, bh);
    ctx.fillStyle = i === pauseSelection ? '#052e16' : '#e2e8f0';
    ctx.font = 'bold 22px Arial';
    ctx.fillText(labels[i], bx + bw / 2, by + 27);
  }
  ctx.textAlign = 'left';
}

    function drawWin() {
      ctx.fillStyle = 'rgba(10,30,20,0.88)';
      ctx.fillRect(220, 102, 560, 190);
      ctx.strokeStyle = '#22c55e';
      ctx.lineWidth = 4;
      ctx.strokeRect(220, 102, 560, 190);
      ctx.fillStyle = '#22c55e';
      ctx.font = 'bold 40px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('LEVEL COMPLETE', W / 2, 155);
      ctx.fillStyle = '#e2e8f0';
      ctx.font = 'bold 30px Arial';
      ctx.fillText(getStageConfig().winTitle, W / 2, 205);
      ctx.font = '20px Arial';
      ctx.fillText(getStageConfig().winSub, W / 2, 248);
      ctx.textAlign = 'left';
    }

    function draw() {
      ctx.save();
      if (state === STATE_BOSS_DEFEAT && bossDefeatSequence) {
        const t = bossDefeatSequence.timer;
        const explosion = bossDefeatSequence.exploded ? bossDefeatSequence.explosionTimer : 0;
        let shakeAmount = 0;
        if (t < 90) shakeAmount = 2.2;
        else if (t < 135) shakeAmount = 1.2;
        if (explosion > 0 && explosion < 18) shakeAmount = 6;
        if (shakeAmount > 0) {
          ctx.translate((Math.random() - 0.5) * shakeAmount, (Math.random() - 0.5) * shakeAmount);
        }
      }
      if (state === STATE_HOME) {
        drawHomeMenu();
      } else if (state === STATE_COLOR_MENU) {
        drawColorMenu();
      } else if (state === STATE_LEVEL_SELECT) {
        drawLevelSelectMenu();
      } else {
        drawBackground();
        drawGround();
        drawObstacles();
        drawPickups();
        drawEnemies();
        drawBoss();
        drawBossBullets();
        drawEnemyBullets();
        drawBullets();
        drawParticles();
        drawPlayer();
        if (state === STATE_RUN || state === STATE_DEAD || state === STATE_BOSS_DEFEAT) drawHUD();
        if (currentStage === STAGE_TUTORIAL && (state === STATE_RUN || state === STATE_DEAD || state === STATE_BOSS_DEFEAT)) drawTutorialPopup();
        if (state === STATE_MENU) drawMenu();
        if (state === 'paused') drawPauseMenu();
      }
      if (state === STATE_BOSS_DEFEAT && bossDefeatSequence) {
        const t = bossDefeatSequence.timer;
        if (t < 135) {
          ctx.fillStyle = 'rgba(255,255,255,0.08)';
          ctx.font = 'bold 28px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('BOSS DEFEATED', W / 2, 72);
          ctx.textAlign = 'left';
        }
      }
      if (state === STATE_BOSS_DEFEAT && bossDefeatSequence && bossDefeatSequence.flash > 0.01) {
        ctx.save();
        ctx.globalAlpha = Math.min(0.45, bossDefeatSequence.flash * 0.55);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
      if (state === STATE_WIN) drawWin();
      if (runtimeError) {
        ctx.fillStyle = 'rgba(120,0,0,0.82)';
        ctx.fillRect(120, 140, W - 240, 100);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 18px Arial';
        ctx.fillText('Runtime error caught — open console if needed.', 150, 180);
        ctx.font = '16px Arial';
        ctx.fillText(String(runtimeError).slice(0, 80), 150, 210);
      }
      ctx.restore();
    }

    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'Space') {
        if (state === STATE_HOME) { openTutorialMenu(STAGE_TUTORIAL); return; }
        if (state === STATE_COLOR_MENU) {
          const chosen = MENU_COLOR_OPTIONS[colorSelectedIndex];
          if (unlockedColors.has(chosen)) {
            setSelectedMenuColor(chosen);
          }
          triggerMenuPreviewJump();
          return;
        }
        if (state === STATE_LEVEL_SELECT) {
          const items = getVisibleLevelItems();
          const item = items[levelSelectedIndex] ?? items[0];
          if (item && !item.locked && item.stage) openTutorialMenu(item.stage);
          return;
        }
        if (state === STATE_MENU) { beginGame(); return; }
        if (state === STATE_WIN) { continueFromWin(); return; }
        if (state === STATE_BOSS_DEFEAT) return;
        if (state === 'paused') {
          if (pauseSelection === 0) resumeGame();
          else if (pauseSelection === 1) resetToMenu();
          return;
        }
        jump();
      }
      if (e.code === 'Escape') {
        if (state === STATE_RUN || state === 'paused') togglePause();
        else if (state === STATE_COLOR_MENU) closeColorMenu();
        else if (state === STATE_LEVEL_SELECT || state === STATE_MENU) openHomeMenu();
      }
      if (state === STATE_COLOR_MENU) {
        if (e.code === 'ArrowUp') colorSelectedIndex = Math.max(0, colorSelectedIndex - 3);
        if (e.code === 'ArrowDown') colorSelectedIndex = Math.min(MENU_COLOR_OPTIONS.length - 1, colorSelectedIndex + 3);
        if (e.code === 'ArrowLeft') colorSelectedIndex = Math.max(0, colorSelectedIndex - 1);
        if (e.code === 'ArrowRight') colorSelectedIndex = Math.min(MENU_COLOR_OPTIONS.length - 1, colorSelectedIndex + 1);
        if (e.code === 'Enter') {
          const chosen = MENU_COLOR_OPTIONS[colorSelectedIndex];
          if (unlockedColors.has(chosen)) {
            setSelectedMenuColor(chosen);
          }
          triggerMenuPreviewJump();
        }
      }
      if (state === 'paused') {
        if (e.code === 'ArrowUp' || e.code === 'ArrowDown') pauseSelection = (pauseSelection + 1) % 2;
      }
      if (state === STATE_LEVEL_SELECT) {
        const maxStart = Math.max(0, LEVEL_SELECT_ITEMS.length - 4);
        if (e.code === 'ArrowUp') {
          if (levelSelectedIndex > 0) levelSelectedIndex -= 1;
          else levelScrollIndex = Math.max(0, levelScrollIndex - 1);
        }
        if (e.code === 'ArrowDown') {
          const visibleCount = getVisibleLevelItems().length;
          if (levelSelectedIndex < visibleCount - 1) levelSelectedIndex += 1;
          else levelScrollIndex = Math.min(maxStart, levelScrollIndex + 1);
        }
        if (e.code === 'Enter') {
          const items = getVisibleLevelItems();
          const item = items[levelSelectedIndex] ?? items[0];
          if (item && !item.locked && item.stage) openTutorialMenu(item.stage);
        }
      }
      if (state === STATE_HOME && (e.code === 'Enter' || e.code === 'ArrowUp' || e.code === 'KeyW')) openTutorialMenu(STAGE_TUTORIAL);
      if (state === STATE_MENU && (e.code === 'Enter' || e.code === 'ArrowUp' || e.code === 'KeyW')) beginGame();
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    window.addEventListener('gamepadconnected', (e) => {
      gamepadIndex = e.gamepad.index;
      keepGamepadFocus();
      lastPadJump = false;
      lastPadShoot = false;
      lastPadMenu = false;
      lastPadAny = false;
      console.log('Gamepad connected:', e.gamepad.id, 'mapping:', e.gamepad.mapping);
    });

    window.addEventListener('gamepaddisconnected', (e) => {
      if (gamepadIndex === e.gamepad.index) gamepadIndex = null;
      lastPadJump = false;
      lastPadShoot = false;
      lastPadMenu = false;
      lastPadAny = false;
    });

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseAim.x = (e.clientX - rect.left) * (W / rect.width);
      mouseAim.y = (e.clientY - rect.top) * (H / rect.height);
    });

        canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (W / rect.width);
      const y = (e.clientY - rect.top) * (H / rect.height);
      if (state === STATE_HOME) {
        for (const btn of homeButtonRects) {
          if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
            if (btn.id === 'play') openTutorialMenu(STAGE_TUTORIAL);
            else if (btn.id === 'color') openColorMenu();
            else if (btn.id === 'levels') openLevelSelectMenu();
            return;
          }
        }
      } else if (state === STATE_COLOR_MENU) {
        if (x >= 58 && x <= 190 && y >= 44 && y <= 86) { closeColorMenu(); return; }
        for (const btn of colorButtonRects) {
          if (!btn.id || !btn.id.startsWith('color_')) continue;
          if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
            if (!btn.locked) setSelectedMenuColor(btn.color);
            return;
          }
        }
      } else if (state === STATE_LEVEL_SELECT) {
        if (x >= 58 && x <= 190 && y >= 44 && y <= 86) { openHomeMenu(); return; }
        if (levelScrollUpRect && x >= levelScrollUpRect.x && x <= levelScrollUpRect.x + levelScrollUpRect.w && y >= levelScrollUpRect.y && y <= levelScrollUpRect.y + levelScrollUpRect.h) {
          levelScrollIndex = Math.max(0, levelScrollIndex - 1); return;
        }
        if (levelScrollDownRect && x >= levelScrollDownRect.x && x <= levelScrollDownRect.x + levelScrollDownRect.w && y >= levelScrollDownRect.y && y <= levelScrollDownRect.y + levelScrollDownRect.h) {
          levelScrollIndex = Math.min(Math.max(0, LEVEL_SELECT_ITEMS.length - 4), levelScrollIndex + 1); return;
        }
        for (const card of levelCardRects) {
          if (!card.item) continue;
          if (x >= card.x && x <= card.x + card.w && y >= card.y && y <= card.y + card.h) {
            if (!card.item.locked && card.item.stage) openTutorialMenu(card.item.stage);
            return;
          }
        }
      } else if (state === STATE_MENU) {
        const btnX = W / 2 - 96, btnY = 240, btnW = 192, btnH = 34;
        if (x >= btnX && x <= btnX + btnW && y >= btnY && y <= btnY + btnH) beginGame();
      } else if (state === STATE_WIN) {
        continueFromWin();
      } else if (state === 'paused') {
        for (const btn of pauseButtons) {
          if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
            pauseSelection = btn.i;
            if (btn.i === 0) resumeGame();
            else if (btn.i === 1) resetToMenu();
          }
        }
      }
    });

    canvas.addEventListener('wheel', (e) => {
      if (state !== STATE_LEVEL_SELECT) return;
      e.preventDefault();
      levelScrollIndex = Math.max(0, Math.min(Math.max(0, LEVEL_SELECT_ITEMS.length - 4), levelScrollIndex + (e.deltaY > 0 ? 1 : -1)));
    }, { passive: false });

    function loop() {
      try {
        update();
        draw();
      } catch (err) {
        console.error(err);
        runtimeError = err?.message || err;
      }
      requestAnimationFrame(loop);
    }

    resetToMenu();
    loop();
  </script>
</body>
</html>
